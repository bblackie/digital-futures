<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#fff8f1"/>
  <text x="85" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="700" fill="#7a3d00">CRUD Query Examples</text>

  <rect x="80" y="160" width="540" height="230" rx="16" fill="#ffffff" stroke="#c15c00" stroke-width="3"/>
  <text x="115" y="215" font-family="Consolas, monospace" font-size="28" fill="#7a3d00">INSERT INTO tasks (...) VALUES (...);</text>
  <text x="115" y="265" font-family="Consolas, monospace" font-size="28" fill="#7a3d00">SELECT id, title FROM tasks</text>
  <text x="115" y="305" font-family="Consolas, monospace" font-size="28" fill="#7a3d00">WHERE status != 'done';</text>
  <text x="115" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#a14e00">Create and Read</text>

  <rect x="660" y="160" width="540" height="230" rx="16" fill="#ffffff" stroke="#c15c00" stroke-width="3"/>
  <text x="695" y="215" font-family="Consolas, monospace" font-size="28" fill="#7a3d00">UPDATE tasks SET status='done'</text>
  <text x="695" y="255" font-family="Consolas, monospace" font-size="28" fill="#7a3d00">WHERE id = 1;</text>
  <text x="695" y="305" font-family="Consolas, monospace" font-size="28" fill="#7a3d00">DELETE FROM tasks</text>
  <text x="695" y="345" font-family="Consolas, monospace" font-size="28" fill="#7a3d00">WHERE id = 1;</text>
  <text x="695" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#a14e00">Update and Delete</text>

  <rect x="80" y="440" width="1120" height="190" rx="16" fill="#fff1e1" stroke="#c15c00" stroke-width="3"/>
  <text x="120" y="510" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#7a3d00">Safety Rule</text>
  <text x="120" y="565" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#7a3d00">Before UPDATE or DELETE, check the WHERE clause targets only intended rows.</text>
</svg>