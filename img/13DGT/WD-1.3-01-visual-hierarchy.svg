<svg width="720" height="380" viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="720" height="380" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="718" height="378" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A202C">Visual Hierarchy: Four Tools</text>
  <text x="360" y="50" text-anchor="middle" font-size="11" fill="#718096">Users scan — not read. Make important things obvious using these levers.</text>

  <!-- TOOL 1: SIZE -->
  <rect x="18" y="66" width="162" height="292" rx="10" fill="#EBF8FF" stroke="#63B3ED" stroke-width="2"/>
  <rect x="18" y="66" width="162" height="34" rx="10" fill="#4299E1"/>
  <rect x="18" y="84" width="162" height="16" fill="#4299E1"/>
  <text x="99" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SIZE</text>
  <!-- Size demo -->
  <text x="99" y="130" text-anchor="middle" font-size="28" font-weight="bold" fill="#2B6CB0">AAA</text>
  <text x="99" y="163" text-anchor="middle" font-size="18" fill="#4299E1">AAA</text>
  <text x="99" y="191" text-anchor="middle" font-size="11" fill="#63B3ED">AAA</text>
  <line x1="36" y1="205" x2="162" y2="205" stroke="#BEE3F8" stroke-width="1"/>
  <text x="99" y="224" text-anchor="middle" font-size="10" fill="#2C5282" font-weight="bold">Rule:</text>
  <text x="99" y="240" text-anchor="middle" font-size="10" fill="#4A5568">Larger elements</text>
  <text x="99" y="255" text-anchor="middle" font-size="10" fill="#4A5568">attract attention</text>
  <text x="99" y="270" text-anchor="middle" font-size="10" fill="#4A5568">first. Size signals</text>
  <text x="99" y="285" text-anchor="middle" font-size="10" fill="#4A5568">relative importance</text>
  <text x="99" y="300" text-anchor="middle" font-size="10" fill="#4A5568">in the layout.</text>
  <text x="99" y="320" text-anchor="middle" font-size="9" fill="#2B6CB0" font-style="italic">Heading &gt; Body &gt; Label</text>
  <text x="99" y="350" text-anchor="middle" font-size="9" fill="#718096">Primary → Secondary → Tertiary</text>

  <!-- TOOL 2: COLOUR -->
  <rect x="196" y="66" width="162" height="292" rx="10" fill="#F0FFF4" stroke="#68D391" stroke-width="2"/>
  <rect x="196" y="66" width="162" height="34" rx="10" fill="#38A169"/>
  <rect x="196" y="84" width="162" height="16" fill="#38A169"/>
  <text x="277" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="white">COLOUR</text>
  <!-- Colour demo -->
  <rect x="217" y="108" width="120" height="28" rx="5" fill="#E53E3E"/>
  <text x="277" y="127" text-anchor="middle" font-size="12" font-weight="bold" fill="white">BUY NOW</text>
  <rect x="217" y="143" width="120" height="28" rx="5" fill="#A0AEC0"/>
  <text x="277" y="162" text-anchor="middle" font-size="11" fill="white">Learn more</text>
  <rect x="217" y="178" width="120" height="28" rx="5" fill="#E2E8F0"/>
  <text x="277" y="197" text-anchor="middle" font-size="10" fill="#718096">Dismiss</text>
  <line x1="214" y1="215" x2="340" y2="215" stroke="#C6F6D5" stroke-width="1"/>
  <text x="277" y="234" text-anchor="middle" font-size="10" fill="#276749" font-weight="bold">Rule:</text>
  <text x="277" y="250" text-anchor="middle" font-size="10" fill="#4A5568">Bright, saturated</text>
  <text x="277" y="265" text-anchor="middle" font-size="10" fill="#4A5568">colours stand out.</text>
  <text x="277" y="280" text-anchor="middle" font-size="10" fill="#4A5568">Muted colours</text>
  <text x="277" y="295" text-anchor="middle" font-size="10" fill="#4A5568">recede into the</text>
  <text x="277" y="310" text-anchor="middle" font-size="10" fill="#4A5568">background.</text>
  <text x="277" y="350" text-anchor="middle" font-size="9" fill="#718096">Primary → Secondary → Tertiary</text>

  <!-- TOOL 3: CONTRAST -->
  <rect x="374" y="66" width="162" height="292" rx="10" fill="#FFFBEB" stroke="#F6AD55" stroke-width="2"/>
  <rect x="374" y="66" width="162" height="34" rx="10" fill="#D69E2E"/>
  <rect x="374" y="84" width="162" height="16" fill="#D69E2E"/>
  <text x="455" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="white">CONTRAST</text>
  <!-- Contrast demo -->
  <rect x="392" y="105" width="126" height="26" rx="4" fill="#1A202C"/>
  <text x="455" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="white">High contrast</text>
  <rect x="392" y="138" width="126" height="26" rx="4" fill="#CBD5E0"/>
  <text x="455" y="155" text-anchor="middle" font-size="11" fill="#A0AEC0">Low contrast</text>
  <rect x="392" y="171" width="126" height="26" rx="4" fill="#EDF2F7"/>
  <text x="455" y="188" text-anchor="middle" font-size="10" fill="#CBD5E0">Almost invisible</text>
  <line x1="392" y1="207" x2="518" y2="207" stroke="#FEEBC8" stroke-width="1"/>
  <text x="455" y="226" text-anchor="middle" font-size="10" fill="#744210" font-weight="bold">Rule:</text>
  <text x="455" y="242" text-anchor="middle" font-size="10" fill="#4A5568">Differences in</text>
  <text x="455" y="257" text-anchor="middle" font-size="10" fill="#4A5568">colour, size, shape</text>
  <text x="455" y="272" text-anchor="middle" font-size="10" fill="#4A5568">attract attention.</text>
  <text x="455" y="287" text-anchor="middle" font-size="10" fill="#4A5568">Low contrast =</text>
  <text x="455" y="302" text-anchor="middle" font-size="10" fill="#4A5568">less importance.</text>
  <text x="455" y="350" text-anchor="middle" font-size="9" fill="#718096">Primary → Secondary → Tertiary</text>

  <!-- TOOL 4: POSITION -->
  <rect x="552" y="66" width="150" height="292" rx="10" fill="#FAF5FF" stroke="#B794F4" stroke-width="2"/>
  <rect x="552" y="66" width="150" height="34" rx="10" fill="#805AD5"/>
  <rect x="552" y="84" width="150" height="16" fill="#805AD5"/>
  <text x="627" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="white">POSITION</text>
  <!-- Position demo - mini layout -->
  <rect x="568" y="106" width="118" height="90" rx="5" fill="white" stroke="#E9D8FD" stroke-width="1"/>
  <rect x="572" y="110" width="110" height="16" rx="2" fill="#E9D8FD"/>
  <text x="627" y="122" text-anchor="middle" font-size="8" fill="#553C9A">← Strong (top-left)</text>
  <rect x="598" y="134" width="56" height="12" rx="2" fill="#D6BCFA"/>
  <text x="626" y="144" text-anchor="middle" font-size="8" fill="#553C9A">Center: draws eye</text>
  <text x="659" y="185" text-anchor="end" font-size="8" fill="#B794F4">Edges:</text>
  <text x="659" y="196" text-anchor="end" font-size="8" fill="#B794F4">less noticed</text>
  <line x1="568" y1="207" x2="686" y2="207" stroke="#E9D8FD" stroke-width="1"/>
  <text x="627" y="226" text-anchor="middle" font-size="10" fill="#553C9A" font-weight="bold">Rule:</text>
  <text x="627" y="242" text-anchor="middle" font-size="10" fill="#4A5568">Top-left draws</text>
  <text x="627" y="257" text-anchor="middle" font-size="10" fill="#4A5568">attention first (in</text>
  <text x="627" y="272" text-anchor="middle" font-size="10" fill="#4A5568">LTR languages).</text>
  <text x="627" y="287" text-anchor="middle" font-size="10" fill="#4A5568">Edges are the</text>
  <text x="627" y="302" text-anchor="middle" font-size="10" fill="#4A5568">weakest position.</text>
  <text x="627" y="350" text-anchor="middle" font-size="9" fill="#718096">Primary → Secondary → Tertiary</text>

  <!-- Footer -->
  <text x="360" y="372" text-anchor="middle" font-size="10" fill="#A0AEC0">Combine all four tools — they reinforce each other to create a clear, scannable hierarchy</text>
</svg>
