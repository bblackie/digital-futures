<svg width="780" height="300" viewBox="0 0 780 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="780" height="300" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="778" height="298" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A202C">Four-Week Unit Timeline</text>
  <text x="390" y="50" text-anchor="middle" font-size="11" fill="#718096">Each phase builds on the previous — don't skip ahead</text>

  <!-- Timeline bar -->
  <rect x="40" y="78" width="700" height="8" rx="4" fill="#E2E8F0"/>
  <!-- Progress fill (conceptual progress) -->
  <rect x="40" y="78" width="700" height="8" rx="4" fill="url(#tlGrad)"/>
  <defs>
    <linearGradient id="tlGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9AE6B4"/>
      <stop offset="33%" stop-color="#63B3ED"/>
      <stop offset="66%" stop-color="#F6AD55"/>
      <stop offset="100%" stop-color="#FC8181"/>
    </linearGradient>
  </defs>

  <!-- Week markers on timeline -->
  <circle cx="40" cy="82" r="10" fill="#9AE6B4" stroke="white" stroke-width="2"/>
  <text x="40" y="86" text-anchor="middle" font-size="9" font-weight="bold" fill="#1C4532">W1</text>

  <circle cx="215" cy="82" r="10" fill="#63B3ED" stroke="white" stroke-width="2"/>
  <text x="215" y="86" text-anchor="middle" font-size="9" font-weight="bold" fill="#1A365D">W2</text>

  <circle cx="565" cy="82" r="10" fill="#F6AD55" stroke="white" stroke-width="2"/>
  <text x="565" y="86" text-anchor="middle" font-size="9" font-weight="bold" fill="#744210">W3</text>

  <circle cx="740" cy="82" r="10" fill="#FC8181" stroke="white" stroke-width="2"/>
  <text x="740" y="86" text-anchor="middle" font-size="9" font-weight="bold" fill="#63171B">W4</text>

  <!-- Week 1 Card -->
  <rect x="20" y="110" width="175" height="155" rx="10" fill="#F0FFF4" stroke="#68D391" stroke-width="2"/>
  <rect x="20" y="110" width="175" height="36" rx="10" fill="#68D391"/>
  <rect x="20" y="130" width="175" height="16" fill="#68D391"/>
  <text x="107" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1C4532">Week 1</text>
  <text x="107" y="145" text-anchor="middle" font-size="10" fill="#1C4532">Research &amp; Architecture</text>
  <text x="30" y="166" font-size="10" fill="#276749" font-weight="bold">Activities:</text>
  <text x="30" y="181" font-size="10" fill="#2F855A">• User research and interviews</text>
  <text x="30" y="196" font-size="10" fill="#2F855A">• Create 2–3 user personas</text>
  <text x="30" y="211" font-size="10" fill="#2F855A">• Information architecture map</text>
  <text x="30" y="226" font-size="10" fill="#2F855A">• Initial IA sketches</text>
  <text x="30" y="253" font-size="9" fill="#276749" font-style="italic">Deliverable: Personas + IA map</text>

  <!-- Week 2 Card -->
  <rect x="205" y="110" width="175" height="155" rx="10" fill="#EBF8FF" stroke="#63B3ED" stroke-width="2"/>
  <rect x="205" y="110" width="175" height="36" rx="10" fill="#63B3ED"/>
  <rect x="205" y="130" width="175" height="16" fill="#63B3ED"/>
  <text x="292" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A365D">Week 2</text>
  <text x="292" y="145" text-anchor="middle" font-size="10" fill="#1A365D">Wireframes &amp; First Prototype</text>
  <text x="215" y="166" font-size="10" fill="#2C5282" font-weight="bold">Activities:</text>
  <text x="215" y="181" font-size="10" fill="#2B6CB0">• Low-fi wireframes (paper/Figma)</text>
  <text x="215" y="196" font-size="10" fill="#2B6CB0">• Prototyping tool intro session</text>
  <text x="215" y="211" font-size="10" fill="#2B6CB0">• First hi-fi prototype draft</text>
  <text x="215" y="226" font-size="10" fill="#2B6CB0">• Apply visual design principles</text>
  <text x="215" y="253" font-size="9" fill="#2C5282" font-style="italic">Deliverable: Wireframes + prototype v1</text>

  <!-- Week 3 Card -->
  <rect x="390" y="110" width="175" height="155" rx="10" fill="#FFFBEB" stroke="#F6AD55" stroke-width="2"/>
  <rect x="390" y="110" width="175" height="36" rx="10" fill="#F6AD55"/>
  <rect x="390" y="130" width="175" height="16" fill="#F6AD55"/>
  <text x="477" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#744210">Week 3</text>
  <text x="477" y="145" text-anchor="middle" font-size="10" fill="#744210">User Testing</text>
  <text x="400" y="166" font-size="10" fill="#92400E" font-weight="bold">Activities:</text>
  <text x="400" y="181" font-size="10" fill="#B45309">• Recruit 3+ test participants</text>
  <text x="400" y="196" font-size="10" fill="#B45309">• Conduct testing sessions</text>
  <text x="400" y="211" font-size="10" fill="#B45309">• Summarise usability findings</text>
  <text x="400" y="226" font-size="10" fill="#B45309">• Identify top issues to fix</text>
  <text x="400" y="253" font-size="9" fill="#92400E" font-style="italic">Deliverable: Testing notes + summary</text>

  <!-- Week 4 Card -->
  <rect x="575" y="110" width="185" height="155" rx="10" fill="#FFF5F7" stroke="#FC8181" stroke-width="2"/>
  <rect x="575" y="110" width="185" height="36" rx="10" fill="#FC8181"/>
  <rect x="575" y="130" width="185" height="16" fill="#FC8181"/>
  <text x="667" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#63171B">Week 4</text>
  <text x="667" y="145" text-anchor="middle" font-size="10" fill="#63171B">Iteration &amp; Final Submission</text>
  <text x="585" y="166" font-size="10" fill="#9B2335" font-weight="bold">Activities:</text>
  <text x="585" y="181" font-size="10" fill="#C53030">• Apply design changes</text>
  <text x="585" y="196" font-size="10" fill="#C53030">• WCAG accessibility verification</text>
  <text x="585" y="211" font-size="10" fill="#C53030">• Final prototype polish</text>
  <text x="585" y="226" font-size="10" fill="#C53030">• Documentation &amp; design critique</text>
  <text x="585" y="253" font-size="9" fill="#9B2335" font-style="italic">Deliverable: Final prototype + all docs</text>

  <!-- Footer note -->
  <text x="390" y="291" text-anchor="middle" font-size="10" fill="#A0AEC0">Formative checkpoints occur weekly — evidence must be gathered throughout, not at the end</text>
</svg>
