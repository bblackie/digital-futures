<svg width="700" height="320" viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="320" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="698" height="318" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <text x="350" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A202C">White Space: Crowded vs. Breathable</text>
  <text x="350" y="50" text-anchor="middle" font-size="11" fill="#718096">White space is a design tool — not wasted space</text>

  <!-- BAD side -->
  <rect x="18" y="65" width="315" height="228" rx="10" fill="#FFF5F7" stroke="#FC8181" stroke-width="2"/>
  <rect x="18" y="65" width="315" height="34" rx="10" fill="#FC8181"/>
  <rect x="18" y="83" width="315" height="16" fill="#FC8181"/>
  <text x="175" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="white">✗ No White Space (Crowded)</text>

  <!-- Simulate crowded layout -->
  <rect x="34" y="108" width="283" height="170" rx="5" fill="white" stroke="#FED7D7" stroke-width="1"/>
  <rect x="38" y="112" width="271" height="12" rx="2" fill="#FEB2B2"/>
  <text x="173" y="122" text-anchor="middle" font-size="8" fill="#9B2335">HEADER  Nav1  Nav2  Nav3  Nav4  Nav5  Search</text>
  <text x="44" y="136" font-size="8" fill="#4A5568">Hero title text goes here, quite long, filling the full width</text>
  <text x="44" y="148" font-size="8" fill="#4A5568">Subtitle follows immediately with no gap above or below</text>
  <rect x="44" y="152" width="72" height="10" rx="2" fill="#FC8181"/>
  <text x="80" y="161" text-anchor="middle" font-size="7" fill="white">CTA Button</text>
  <rect x="44" y="164" width="90" height="44" rx="2" fill="#EDF2F7" stroke="#E2E8F0" stroke-width="1"/>
  <text x="89" y="178" text-anchor="middle" font-size="7" fill="#4A5568">Product 1 $50</text>
  <text x="89" y="190" text-anchor="middle" font-size="7" fill="#4A5568">Some description</text>
  <text x="89" y="202" text-anchor="middle" font-size="7" fill="#4A5568">here for product</text>
  <rect x="138" y="164" width="90" height="44" rx="2" fill="#EDF2F7" stroke="#E2E8F0" stroke-width="1"/>
  <text x="183" y="178" text-anchor="middle" font-size="7" fill="#4A5568">Product 2 $60</text>
  <text x="183" y="190" text-anchor="middle" font-size="7" fill="#4A5568">More description</text>
  <text x="183" y="202" text-anchor="middle" font-size="7" fill="#4A5568">crammed in here</text>
  <rect x="232" y="164" width="79" height="44" rx="2" fill="#EDF2F7" stroke="#E2E8F0" stroke-width="1"/>
  <text x="271" y="178" text-anchor="middle" font-size="7" fill="#4A5568">Product 3</text>
  <text x="271" y="190" text-anchor="middle" font-size="7" fill="#4A5568">$55 more text</text>
  <text x="271" y="202" text-anchor="middle" font-size="7" fill="#4A5568">description here</text>
  <text x="44" y="218" font-size="7" fill="#4A5568">Footer links contact privacy terms about sitemap copyright 2026 all rights reserved</text>

  <text x="175" y="263" text-anchor="middle" font-size="10" fill="#9B2335" font-weight="bold">Problem:</text>
  <text x="175" y="279" text-anchor="middle" font-size="10" fill="#C53030">Elements compete for attention.</text>
  <text x="175" y="293" text-anchor="middle" font-size="10" fill="#C53030">Hard to scan; cognitive overload.</text>

  <!-- GOOD side -->
  <rect x="367" y="65" width="315" height="228" rx="10" fill="#F0FFF4" stroke="#68D391" stroke-width="2"/>
  <rect x="367" y="65" width="315" height="34" rx="10" fill="#38A169"/>
  <rect x="367" y="83" width="315" height="16" fill="#38A169"/>
  <text x="524" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="white">✓ Good White Space (Breathable)</text>

  <!-- Simulate breathable layout -->
  <rect x="383" y="108" width="283" height="170" rx="5" fill="white" stroke="#C6F6D5" stroke-width="1"/>
  <rect x="390" y="113" width="267" height="14" rx="2" fill="#C6F6D5"/>
  <text x="524" y="124" text-anchor="middle" font-size="8" fill="#276749">Brand   Home   About   Pricing       [Sign Up]</text>
  <text x="390" y="144" font-size="10" font-weight="bold" fill="#1A202C">Hero title — clear and readable</text>
  <text x="390" y="158" font-size="8" fill="#718096">Subtitle with breathing room above</text>
  <rect x="390" y="165" width="68" height="12" rx="4" fill="#38A169"/>
  <text x="424" y="175" text-anchor="middle" font-size="7" font-weight="bold" fill="white">Get Started →</text>

  <rect x="390" y="184" width="82" height="46" rx="4" fill="#F0FFF4" stroke="#68D391" stroke-width="1"/>
  <text x="431" y="200" text-anchor="middle" font-size="7" font-weight="bold" fill="#276749">Product 1</text>
  <text x="431" y="212" text-anchor="middle" font-size="7" fill="#4A5568">$50</text>
  <text x="431" y="224" text-anchor="middle" font-size="7" fill="#718096">Short desc</text>

  <rect x="483" y="184" width="82" height="46" rx="4" fill="#F0FFF4" stroke="#68D391" stroke-width="1"/>
  <text x="524" y="200" text-anchor="middle" font-size="7" font-weight="bold" fill="#276749">Product 2</text>
  <text x="524" y="212" text-anchor="middle" font-size="7" fill="#4A5568">$60</text>
  <text x="524" y="224" text-anchor="middle" font-size="7" fill="#718096">Short desc</text>

  <rect x="576" y="184" width="82" height="46" rx="4" fill="#F0FFF4" stroke="#68D391" stroke-width="1"/>
  <text x="617" y="200" text-anchor="middle" font-size="7" font-weight="bold" fill="#276749">Product 3</text>
  <text x="617" y="212" text-anchor="middle" font-size="7" fill="#4A5568">$55</text>
  <text x="617" y="224" text-anchor="middle" font-size="7" fill="#718096">Short desc</text>

  <text x="524" y="263" text-anchor="middle" font-size="10" fill="#276749" font-weight="bold">Result:</text>
  <text x="524" y="279" text-anchor="middle" font-size="10" fill="#2F855A">Each element has room to breathe.</text>
  <text x="524" y="293" text-anchor="middle" font-size="10" fill="#2F855A">Easy to scan; clear focal points.</text>

  <text x="350" y="312" text-anchor="middle" font-size="10" fill="#A0AEC0">White space is not emptiness — it is clarity. More padding often improves conversion rates.</text>
</svg>
