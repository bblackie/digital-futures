<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg)"/>
  <!-- Title -->
  <text x="480" y="60" text-anchor="middle" fill="#e0e0e0" font-size="28" font-weight="700">Why User Research Matters</text>
  <line x1="360" y1="75" x2="600" y2="75" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>

  <!-- Wrong Approach Card -->
  <rect x="50" y="110" width="400" height="350" rx="16" fill="#2d1b1b" stroke="#e53935" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="90" cy="150" r="22" fill="#e53935" opacity="0.9"/>
  <text x="90" y="157" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">✕</text>
  <text x="125" y="157" fill="#e53935" font-size="22" font-weight="700">The Wrong Approach</text>
  <!-- Quote -->
  <text x="80" y="210" fill="#ef9a9a" font-size="17" font-style="italic">"I like this design,</text>
  <text x="80" y="235" fill="#ef9a9a" font-size="17" font-style="italic"> so users will like it"</text>
  <!-- Icons/bullets -->
  <circle cx="90" cy="280" r="6" fill="#e57373"/>
  <text x="110" y="286" fill="#e0e0e0" font-size="15">Designs based on personal taste</text>
  <circle cx="90" cy="315" r="6" fill="#e57373"/>
  <text x="110" y="321" fill="#e0e0e0" font-size="15">Ignores real user behaviour</text>
  <circle cx="90" cy="350" r="6" fill="#e57373"/>
  <text x="110" y="356" fill="#e0e0e0" font-size="15">Problems found after launch</text>
  <circle cx="90" cy="385" r="6" fill="#e57373"/>
  <text x="110" y="391" fill="#e0e0e0" font-size="15">Costly redesigns &amp; user frustration</text>
  <!-- Sad face icon -->
  <circle cx="250" cy="430" r="16" fill="none" stroke="#e57373" stroke-width="2"/>
  <circle cx="244" cy="426" r="2" fill="#e57373"/>
  <circle cx="256" cy="426" r="2" fill="#e57373"/>
  <path d="M242 438 Q250 432 258 438" fill="none" stroke="#e57373" stroke-width="1.5"/>

  <!-- Right Approach Card -->
  <rect x="510" y="110" width="400" height="350" rx="16" fill="#1b2d1b" stroke="#43a047" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="550" cy="150" r="22" fill="#43a047" opacity="0.9"/>
  <text x="550" y="158" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">✓</text>
  <text x="585" y="157" fill="#43a047" font-size="22" font-weight="700">The Right Approach</text>
  <!-- Quote -->
  <text x="540" y="210" fill="#a5d6a7" font-size="17" font-style="italic">"What do users actually need?</text>
  <text x="540" y="235" fill="#a5d6a7" font-size="17" font-style="italic"> How do they behave?"</text>
  <!-- Icons/bullets -->
  <circle cx="550" cy="280" r="6" fill="#66bb6a"/>
  <text x="570" y="286" fill="#e0e0e0" font-size="15">Designs based on real evidence</text>
  <circle cx="550" cy="315" r="6" fill="#66bb6a"/>
  <text x="570" y="321" fill="#e0e0e0" font-size="15">User needs drive decisions</text>
  <circle cx="550" cy="350" r="6" fill="#66bb6a"/>
  <text x="570" y="356" fill="#e0e0e0" font-size="15">Problems caught early</text>
  <circle cx="550" cy="385" r="6" fill="#66bb6a"/>
  <text x="570" y="391" fill="#e0e0e0" font-size="15">Efficient builds &amp; happy users</text>
  <!-- Happy face icon -->
  <circle cx="710" cy="430" r="16" fill="none" stroke="#66bb6a" stroke-width="2"/>
  <circle cx="704" cy="426" r="2" fill="#66bb6a"/>
  <circle cx="716" cy="426" r="2" fill="#66bb6a"/>
  <path d="M702 434 Q710 440 718 434" fill="none" stroke="#66bb6a" stroke-width="1.5"/>

  <!-- VS divider -->
  <circle cx="480" cy="285" r="24" fill="#263238" stroke="#4fc3f7" stroke-width="2"/>
  <text x="480" y="292" text-anchor="middle" fill="#4fc3f7" font-size="16" font-weight="700">VS</text>

  <!-- Footer -->
  <text x="480" y="510" text-anchor="middle" fill="#78909c" font-size="13">WD-1.1 · User Research &amp; Personas · 13DGT</text>
</svg>