<svg width="800" height="340" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f1f3f5" rx="16"/>
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#495057">Choosing the Right Method</text>
  <!-- Central question -->
  <rect x="280" y="55" width="240" height="40" rx="20" fill="#495057"/>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">What kind of lesson?</text>
  <!-- Branches -->
  <!-- Left side -->
  <line x1="320" y1="95" x2="150" y2="145" stroke="#7048e8" stroke-width="2"/>
  <rect x="60" y="130" width="180" height="35" rx="17" fill="#7048e8"/>
  <text x="150" y="152" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Structured → Cornell</text>

  <line x1="310" y1="95" x2="150" y2="205" stroke="#1864ab" stroke-width="2"/>
  <rect x="60" y="190" width="180" height="35" rx="17" fill="#1864ab"/>
  <text x="150" y="212" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Comparing → Charting</text>

  <line x1="320" y1="95" x2="150" y2="265" stroke="#5f3dc4" stroke-width="2"/>
  <rect x="60" y="250" width="180" height="35" rx="17" fill="#5f3dc4"/>
  <text x="150" y="272" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Fast-paced → Sentence</text>

  <!-- Right side -->
  <line x1="480" y1="95" x2="650" y2="145" stroke="#d9480f" stroke-width="2"/>
  <rect x="560" y="130" width="180" height="35" rx="17" fill="#d9480f"/>
  <text x="650" y="152" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Hierarchical → Outline</text>

  <line x1="490" y1="95" x2="650" y2="205" stroke="#e67700" stroke-width="2"/>
  <rect x="560" y="190" width="180" height="35" rx="17" fill="#e67700"/>
  <text x="650" y="212" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Creative → Sketch-noting</text>

  <line x1="480" y1="95" x2="650" y2="265" stroke="#0b7285" stroke-width="2"/>
  <rect x="560" y="250" width="180" height="35" rx="17" fill="#0b7285"/>
  <text x="650" y="272" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Connections → Mind Map</text>

  <!-- Footer -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#868e96">No single method is best — match the method to the situation</text>
</svg>