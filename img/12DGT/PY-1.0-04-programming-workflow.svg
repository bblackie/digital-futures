<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="760" height="290" rx="14" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A202C">Programming Workflow</text>

  <!-- === Main flow nodes (top row) === -->

  <!-- Node 1: Problem Statement -->
  <rect x="18" y="50" width="110" height="52" rx="8" fill="#EBF8FF" stroke="#3182CE" stroke-width="1.8"/>
  <text x="73" y="71" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C5282">Problem</text>
  <text x="73" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C5282">Statement</text>
  <text x="73" y="98" text-anchor="middle" font-size="8.5" fill="#4A90D9">Read carefully</text>

  <!-- Arrow 1→2 -->
  <line x1="128" y1="76" x2="158" y2="76" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 2: Design -->
  <rect x="160" y="50" width="110" height="52" rx="8" fill="#FAF5FF" stroke="#805AD5" stroke-width="1.8"/>
  <text x="215" y="71" text-anchor="middle" font-size="10" font-weight="bold" fill="#44337A">Design</text>
  <text x="215" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#44337A">(Plan)</text>
  <text x="215" y="98" text-anchor="middle" font-size="8.5" fill="#7C5CBF">Pseudocode / Flowchart</text>

  <!-- Arrow 2→3 -->
  <line x1="270" y1="76" x2="300" y2="76" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 3: Code -->
  <rect x="302" y="50" width="110" height="52" rx="8" fill="#F0FFF4" stroke="#38A169" stroke-width="1.8"/>
  <text x="357" y="71" text-anchor="middle" font-size="10" font-weight="bold" fill="#22543D">Code</text>
  <text x="357" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#22543D">(Implement)</text>
  <text x="357" y="98" text-anchor="middle" font-size="8.5" fill="#38A169">Write Python</text>

  <!-- Arrow 3→4 -->
  <line x1="412" y1="76" x2="442" y2="76" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 4: Test -->
  <rect x="444" y="50" width="110" height="52" rx="8" fill="#FFFFF0" stroke="#D69E2E" stroke-width="1.8"/>
  <text x="499" y="71" text-anchor="middle" font-size="10" font-weight="bold" fill="#744210">Test</text>
  <text x="499" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#744210">(Verify)</text>
  <text x="499" y="98" text-anchor="middle" font-size="8.5" fill="#D69E2E">Run test cases</text>

  <!-- Arrow 4→Diamond -->
  <line x1="554" y1="76" x2="590" y2="76" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diamond: Works? -->
  <polygon points="630,52 672,76 630,100 588,76" fill="#FFF5F5" stroke="#E53E3E" stroke-width="1.8"/>
  <text x="630" y="72" text-anchor="middle" font-size="9" font-weight="bold" fill="#742A2A">Works</text>
  <text x="630" y="85" text-anchor="middle" font-size="9" font-weight="bold" fill="#742A2A">?</text>

  <!-- YES arrow from diamond → Node 6 (right) -->
  <line x1="672" y1="76" x2="700" y2="76" stroke="#38A169" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="686" y="68" text-anchor="middle" font-size="9" fill="#38A169">Yes</text>

  <!-- Node 6: Document -->
  <rect x="702" y="50" width="44" height="52" rx="8" fill="#F0FFF4" stroke="#38A169" stroke-width="1.8"/>
  <text x="724" y="71" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#22543D">Docu-</text>
  <text x="724" y="84" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#22543D">ment</text>
  <text x="724" y="97" text-anchor="middle" font-size="7.5" fill="#38A169">&amp; Submit</text>

  <!-- NO arrow from diamond down to Debug -->
  <line x1="630" y1="100" x2="630" y2="136" stroke="#E53E3E" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="642" y="124" text-anchor="start" font-size="9" fill="#E53E3E">No</text>

  <!-- === Debug row === -->

  <!-- Node 5: Debug -->
  <rect x="540" y="138" width="180" height="52" rx="8" fill="#FFF5F5" stroke="#E53E3E" stroke-width="1.8"/>
  <text x="630" y="159" text-anchor="middle" font-size="10" font-weight="bold" fill="#742A2A">Debug</text>
  <text x="630" y="174" text-anchor="middle" font-size="9" fill="#C53030">Identify error → fix → document</text>
  <text x="630" y="187" text-anchor="middle" font-size="9" fill="#C53030">the change you made and why</text>

  <!-- Arrow Debug → Code (back arrow going left, then up) -->
  <!-- Down from Debug box -->
  <line x1="630" y1="190" x2="630" y2="216" stroke="#DD6B20" stroke-width="1.5"/>
  <!-- Left across the bottom -->
  <line x1="630" y1="216" x2="357" y2="216" stroke="#DD6B20" stroke-width="1.5"/>
  <!-- Up to Code node -->
  <line x1="357" y1="216" x2="357" y2="102" stroke="#DD6B20" stroke-width="1.5" marker-end="url(#arrO)"/>
  <text x="490" y="230" text-anchor="middle" font-size="8.5" fill="#DD6B20">Return to Code with fix applied</text>

  <!-- === Phase labels (bottom bar) === -->
  <rect x="18" y="250" width="272" height="22" rx="5" fill="#EBF8FF"/>
  <text x="154" y="265" text-anchor="middle" font-size="9" fill="#2C5282">Planning Phase — do this before writing any code</text>

  <rect x="296" y="250" width="360" height="22" rx="5" fill="#FFF5F5"/>
  <text x="476" y="265" text-anchor="middle" font-size="9" fill="#742A2A">Iterative Phase — expect to cycle Code → Test → Debug multiple times</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#718096"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38A169"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E53E3E"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#DD6B20"/>
    </marker>
  </defs>
</svg>
