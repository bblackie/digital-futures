<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Implementing Mechanics</title>
  <desc id="desc">A flow from input through scripts and state to visible feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241128"/>
      <stop offset="100%" stop-color="#5a2f67"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="96" fill="#f9f0fb" font-family="Verdana, sans-serif" font-size="44" text-anchor="middle">Implementing Mechanics</text>
  <rect x="120" y="300" width="210" height="110" rx="22" fill="#ffd166"/>
  <rect x="390" y="300" width="210" height="110" rx="22" fill="#72efdd"/>
  <rect x="660" y="300" width="210" height="110" rx="22" fill="#55c1ff"/>
  <rect x="930" y="300" width="210" height="110" rx="22" fill="#ff8fab"/>
  <line x1="330" y1="355" x2="390" y2="355" stroke="#f9f0fb" stroke-width="8" stroke-linecap="round"/>
  <line x1="600" y1="355" x2="660" y2="355" stroke="#f9f0fb" stroke-width="8" stroke-linecap="round"/>
  <line x1="870" y1="355" x2="930" y2="355" stroke="#f9f0fb" stroke-width="8" stroke-linecap="round"/>
  <text x="225" y="364" fill="#3a2a00" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Input</text>
  <text x="495" y="346" fill="#123733" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Script</text>
  <text x="495" y="380" fill="#123733" font-family="Verdana, sans-serif" font-size="20" text-anchor="middle">logic</text>
  <text x="765" y="346" fill="#103246" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Game</text>
  <text x="765" y="380" fill="#103246" font-family="Verdana, sans-serif" font-size="20" text-anchor="middle">state</text>
  <text x="1035" y="346" fill="#57192c" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Feedback</text>
  <text x="640" y="620" fill="#f9f0fb" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Clear mechanics have a traceable cause and effect from player input to game response.</text>
</svg>