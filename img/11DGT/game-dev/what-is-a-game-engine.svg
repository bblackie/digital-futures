<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">What Is a Game Engine?</title>
  <desc id="desc">A central engine connected to graphics, input, physics, and scene management.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2030"/>
      <stop offset="100%" stop-color="#244c66"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="96" fill="#eef7fb" font-family="Verdana, sans-serif" font-size="44" text-anchor="middle">What Is a Game Engine?</text>
  <circle cx="640" cy="370" r="110" fill="#ffd166"/>
  <text x="640" y="360" fill="#3a2a00" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Game</text>
  <text x="640" y="398" fill="#3a2a00" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Engine</text>
  <line x1="640" y1="260" x2="640" y2="170" stroke="#eef7fb" stroke-width="8" stroke-linecap="round"/>
  <line x1="748" y1="370" x2="980" y2="370" stroke="#eef7fb" stroke-width="8" stroke-linecap="round"/>
  <line x1="640" y1="480" x2="640" y2="570" stroke="#eef7fb" stroke-width="8" stroke-linecap="round"/>
  <line x1="532" y1="370" x2="300" y2="370" stroke="#eef7fb" stroke-width="8" stroke-linecap="round"/>
  <rect x="505" y="85" width="270" height="85" rx="18" fill="#72efdd"/>
  <rect x="980" y="328" width="210" height="85" rx="18" fill="#ff8fab"/>
  <rect x="505" y="570" width="270" height="85" rx="18" fill="#9ccc65"/>
  <rect x="95" y="328" width="255" height="85" rx="18" fill="#55c1ff"/>
  <text x="640" y="138" fill="#123733" font-family="Verdana, sans-serif" font-size="26" text-anchor="middle">Graphics</text>
  <text x="1085" y="382" fill="#57192c" font-family="Verdana, sans-serif" font-size="26" text-anchor="middle">Input</text>
  <text x="640" y="623" fill="#25371a" font-family="Verdana, sans-serif" font-size="26" text-anchor="middle">Physics</text>
  <text x="222" y="382" fill="#103246" font-family="Verdana, sans-serif" font-size="26" text-anchor="middle">Scenes and Objects</text>
  <text x="640" y="685" fill="#eef7fb" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">An engine handles common systems so you can focus on designing the game itself.</text>
</svg>