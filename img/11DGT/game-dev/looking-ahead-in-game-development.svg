<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Looking Ahead</title>
  <desc id="desc">A roadmap toward engines, structure, and coding mechanics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1c2b"/>
      <stop offset="100%" stop-color="#1f4f7a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="98" fill="#f6fbff" font-family="Verdana, sans-serif" font-size="46" text-anchor="middle">Looking Ahead</text>
  <path d="M170 500 C300 440, 360 560, 500 500 S700 440, 810 500 S1030 560, 1110 460" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <circle cx="280" cy="470" r="56" fill="#ffd166"/>
  <circle cx="640" cy="500" r="56" fill="#72efdd"/>
  <circle cx="980" cy="500" r="56" fill="#ff8fab"/>
  <text x="280" y="478" fill="#3c2d00" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">Engine</text>
  <text x="640" y="508" fill="#113631" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">Structure</text>
  <text x="980" y="508" fill="#57192c" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">Code</text>
  <rect x="210" y="170" width="860" height="165" rx="26" fill="#12304a" opacity="0.95"/>
  <text x="640" y="225" fill="#f6fbff" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">Next you will learn how games are built, organised, and scripted.</text>
  <text x="640" y="270" fill="#d4e8f2" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">Each topic builds on the idea that good games are designed systems with purpose.</text>
  <text x="640" y="640" fill="#f6fbff" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Understanding the definition of a game makes the rest of the unit easier to design and justify.</text>
</svg>