<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Iterating on Mechanics</title>
  <desc id="desc">A circular improvement loop showing adjustment, simplification, and refinement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a151d"/>
      <stop offset="100%" stop-color="#6a3045"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="96" fill="#fff0f5" font-family="Verdana, sans-serif" font-size="44" text-anchor="middle">Iterating on Mechanics</text>
  <circle cx="640" cy="385" r="205" fill="none" stroke="#fff0f5" stroke-width="12" stroke-dasharray="18 18"/>
  <polygon points="842,309 918,362 837,387" fill="#fff0f5"/>
  <polygon points="570,590 632,655 540,656" fill="#fff0f5"/>
  <polygon points="353,325 309,404 280,322" fill="#fff0f5"/>
  <circle cx="640" cy="185" r="74" fill="#ffd166"/>
  <circle cx="855" cy="500" r="74" fill="#72efdd"/>
  <circle cx="425" cy="500" r="74" fill="#ff8fab"/>
  <text x="640" y="194" fill="#403000" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Adjust</text>
  <text x="855" y="509" fill="#123733" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Test</text>
  <text x="425" y="509" fill="#57192c" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Simplify</text>
  <text x="640" y="640" fill="#fff0f5" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Iteration improves clarity and playability by refining what the mechanic actually feels like.</text>
</svg>