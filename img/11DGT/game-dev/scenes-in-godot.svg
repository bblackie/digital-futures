<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Scenes</title>
  <desc id="desc">A scene shown as a container grouping multiple related nodes into a reusable part of a game.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172018"/>
      <stop offset="100%" stop-color="#3c6642"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="96" fill="#f2fbf2" font-family="Verdana, sans-serif" font-size="46" text-anchor="middle">Scenes</text>
  <rect x="240" y="180" width="800" height="370" rx="32" fill="#f2fbf2" opacity="0.96"/>
  <text x="640" y="250" fill="#234127" font-family="Verdana, sans-serif" font-size="34" text-anchor="middle">Scene</text>
  <rect x="330" y="310" width="180" height="110" rx="18" fill="#ffd166"/>
  <rect x="550" y="310" width="180" height="110" rx="18" fill="#72efdd"/>
  <rect x="770" y="310" width="180" height="110" rx="18" fill="#ff8fab"/>
  <text x="420" y="375" fill="#3a2a00" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Level</text>
  <text x="640" y="375" fill="#123733" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Menu</text>
  <text x="860" y="375" fill="#57192c" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Enemy Type</text>
  <text x="640" y="620" fill="#f2fbf2" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">A scene groups related nodes so you can build levels, menus, and reusable parts cleanly.</text>
</svg>