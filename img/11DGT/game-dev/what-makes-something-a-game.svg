    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="108" fill="#f4f8ef" font-family="Verdana, sans-serif" font-size="44" text-anchor="middle">What Makes Something a Game?</text>
  <line x1="280" y1="365" x2="1000" y2="365" stroke="#e8f0dc" stroke-width="8"/>
  <line x1="280" y1="365" x2="280" y2="510" stroke="#e8f0dc" stroke-width="6"/>
  <line x1="520" y1="365" x2="520" y2="510" stroke="#e8f0dc" stroke-width="6"/>
