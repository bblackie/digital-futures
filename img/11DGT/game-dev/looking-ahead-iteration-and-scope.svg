<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Looking Ahead</title>
  <desc id="desc">A roadmap from mechanics into iteration, feedback, and scope management.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2b"/>
      <stop offset="100%" stop-color="#285b89"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="98" fill="#f4fbff" font-family="Verdana, sans-serif" font-size="46" text-anchor="middle">Looking Ahead</text>
  <path d="M170 500 C320 430, 420 560, 560 500 S790 430, 920 500 S1050 540, 1120 455" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <circle cx="300" cy="470" r="58" fill="#ffd166"/>
  <circle cx="650" cy="505" r="58" fill="#72efdd"/>
  <circle cx="980" cy="490" r="58" fill="#ff8fab"/>
  <text x="300" y="478" fill="#403000" font-family="Verdana, sans-serif" font-size="20" text-anchor="middle">Iteration</text>
  <text x="650" y="513" fill="#123733" font-family="Verdana, sans-serif" font-size="20" text-anchor="middle">Feedback</text>
  <text x="980" y="498" fill="#57192c" font-family="Verdana, sans-serif" font-size="20" text-anchor="middle">Scope</text>
  <rect x="215" y="170" width="850" height="150" rx="24" fill="#12304a" opacity="0.95"/>
  <text x="640" y="225" fill="#f4fbff" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">Next you will improve games by testing, refining, and managing scope carefully.</text>
  <text x="640" y="270" fill="#d6e8f5" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">Strong mechanics make later iteration useful because there is something meaningful to improve.</text>
  <text x="640" y="640" fill="#f4fbff" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Mechanics are the base that later testing and iteration will build on.</text>
</svg>