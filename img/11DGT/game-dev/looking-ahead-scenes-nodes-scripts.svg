<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Looking Ahead</title>
  <desc id="desc">A roadmap to scenes, nodes, scripts, and mechanics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#2b5f8f"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="98" fill="#f4fbff" font-family="Verdana, sans-serif" font-size="46" text-anchor="middle">Looking Ahead</text>
  <path d="M180 500 C320 430, 400 560, 530 500 S740 430, 860 500 S1030 550, 1110 455" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <circle cx="300" cy="470" r="58" fill="#ffd166"/>
  <circle cx="640" cy="500" r="58" fill="#72efdd"/>
  <circle cx="980" cy="490" r="58" fill="#ff8fab"/>
  <text x="300" y="478" fill="#403000" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">Scenes</text>
  <text x="640" y="508" fill="#123733" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">Nodes</text>
  <text x="980" y="498" fill="#57192c" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">Scripts</text>
  <rect x="205" y="170" width="870" height="150" rx="24" fill="#12304a" opacity="0.95"/>
  <text x="640" y="225" fill="#f4fbff" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">Next comes the structure that Godot uses to organise games and mechanics.</text>
  <text x="640" y="270" fill="#d6e8f5" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">These basics prepare you to understand how objects, code, and behaviour connect.</text>
  <text x="640" y="640" fill="#f4fbff" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Knowing the engine first makes later scene and scripting work easier to explain.</text>
</svg>