<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Interaction and Feedback</title>
  <desc id="desc">A looping cycle showing player action, game response, and player reaction.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#2b1840"/>
      <stop offset="100%" stop-color="#12091d"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="98" fill="#f7f0fb" font-family="Verdana, sans-serif" font-size="46" text-anchor="middle">Interaction and Feedback</text>
  <text x="640" y="142" fill="#d9cdea" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Games stay engaging because the player and the system keep reacting to each other.</text>
  <circle cx="640" cy="395" r="215" fill="none" stroke="#f7f0fb" stroke-width="12" stroke-dasharray="18 18"/>
  <polygon points="858,318 934,371 849,393" fill="#f7f0fb"/>
  <polygon points="571,590 630,655 540,658" fill="#f7f0fb"/>
  <polygon points="355,322 309,403 281,320" fill="#f7f0fb"/>
  <circle cx="640" cy="185" r="82" fill="#ff9f68"/>
  <circle cx="860" cy="515" r="82" fill="#4dd0e1"/>
  <circle cx="420" cy="515" r="82" fill="#9ccc65"/>
  <text x="640" y="192" fill="#311a22" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Player</text>
  <text x="640" y="226" fill="#311a22" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">acts</text>
  <text x="860" y="522" fill="#13313b" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Game</text>
  <text x="860" y="556" fill="#13313b" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">responds</text>
  <text x="420" y="522" fill="#24331a" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Player</text>
  <text x="420" y="556" fill="#24331a" font-family="Verdana, sans-serif" font-size="22" text-anchor="middle">reacts</text>
  <text x="640" y="642" fill="#f7f0fb" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">That loop is what gives games momentum and engagement.</text>
</svg>