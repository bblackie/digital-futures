<svg width="720" height="370" viewBox="0 0 720 370" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="720" height="370" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="718" height="368" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A202C">Wireframe Fidelity Levels</text>
  <text x="360" y="50" text-anchor="middle" font-size="11" fill="#718096">Progress from low to high fidelity as you validate structure — not before</text>

  <!-- Progress arrow under title -->
  <defs>
    <marker id="prog" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#4299E1"/>
    </marker>
  </defs>
  <line x1="100" y1="64" x2="620" y2="64" stroke="#4299E1" stroke-width="2.5" marker-end="url(#prog)"/>
  <text x="340" y="61" text-anchor="middle" font-size="10" fill="#2B6CB0">Increasing time investment →</text>

  <!-- LOW FIDELITY -->
  <rect x="20" y="78" width="215" height="270" rx="10" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="2"/>
  <!-- label -->
  <rect x="20" y="78" width="215" height="32" rx="10" fill="#A0AEC0"/>
  <rect x="20" y="96" width="215" height="14" fill="#A0AEC0"/>
  <text x="127" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Low Fidelity</text>
  <text x="127" y="114" text-anchor="middle" font-size="10" fill="white">Paper sketches / whiteboard</text>
  <!-- Mock wireframe sketch -->
  <rect x="36" y="124" width="183" height="90" rx="4" fill="white" stroke="#CBD5E0" stroke-width="1.5"/>
  <rect x="42" y="130" width="171" height="14" rx="2" fill="#E2E8F0"/>
  <rect x="42" y="150" width="60" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="108" y="150" width="105" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="42" y="165" width="83" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="42" y="178" width="171" height="28" rx="2" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="127" y="197" text-anchor="middle" font-size="9" fill="#A0AEC0">[ image placeholder ]</text>
  <!-- pros/cons -->
  <text x="36" y="234" font-size="10" font-weight="bold" fill="#38A169">✓ Pros:</text>
  <text x="36" y="250" font-size="10" fill="#4A5568">• Extremely fast (minutes)</text>
  <text x="36" y="264" font-size="10" fill="#4A5568">• Easy to discard and redo</text>
  <text x="36" y="278" font-size="10" fill="#4A5568">• Encourages iteration</text>
  <text x="36" y="298" font-size="10" font-weight="bold" fill="#E53E3E">✗ Cons:</text>
  <text x="36" y="314" font-size="10" fill="#4A5568">• Hard to test interactivity</text>
  <text x="36" y="328" font-size="10" fill="#4A5568">• Difficult to share remotely</text>
  <text x="36" y="340" font-size="10" fill="#276749" font-style="italic">Best for: early exploration</text>

  <!-- MEDIUM FIDELITY -->
  <rect x="252" y="78" width="215" height="270" rx="10" fill="#F7FAFC" stroke="#63B3ED" stroke-width="2"/>
  <rect x="252" y="78" width="215" height="32" rx="10" fill="#4299E1"/>
  <rect x="252" y="96" width="215" height="14" fill="#4299E1"/>
  <text x="360" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Medium Fidelity</text>
  <text x="360" y="114" text-anchor="middle" font-size="10" fill="white">Digital boxes &amp; labels (Figma)</text>
  <!-- Mock wireframe - slightly more structured -->
  <rect x="268" y="124" width="183" height="90" rx="4" fill="white" stroke="#BEE3F8" stroke-width="1.5"/>
  <rect x="274" y="130" width="171" height="14" rx="2" fill="#BEE3F8"/>
  <text x="359" y="141" text-anchor="middle" font-size="8" fill="#2B6CB0">Header | Nav: Home  About  Pricing</text>
  <rect x="274" y="150" width="60" height="22" rx="2" fill="#EBF8FF" stroke="#63B3ED" stroke-width="1"/>
  <text x="304" y="165" text-anchor="middle" font-size="8" fill="#2B6CB0">Sidebar</text>
  <rect x="340" y="150" width="105" height="22" rx="2" fill="#EBF8FF" stroke="#63B3ED" stroke-width="1"/>
  <text x="392" y="165" text-anchor="middle" font-size="8" fill="#2B6CB0">Main Content Area</text>
  <rect x="274" y="178" width="171" height="28" rx="2" fill="#EBF8FF" stroke="#63B3ED" stroke-width="1"/>
  <text x="359" y="196" text-anchor="middle" font-size="8" fill="#2B6CB0">Footer</text>
  <!-- pros/cons -->
  <text x="268" y="234" font-size="10" font-weight="bold" fill="#38A169">✓ Pros:</text>
  <text x="268" y="250" font-size="10" fill="#4A5568">• Clear layout, shareable</text>
  <text x="268" y="264" font-size="10" fill="#4A5568">• Clickable links testable</text>
  <text x="268" y="278" font-size="10" fill="#4A5568">• Balances speed vs. clarity</text>
  <text x="268" y="298" font-size="10" font-weight="bold" fill="#E53E3E">✗ Cons:</text>
  <text x="268" y="314" font-size="10" fill="#4A5568">• Takes longer than paper</text>
  <text x="268" y="328" font-size="10" fill="#4A5568">• Some tool learning required</text>
  <text x="268" y="340" font-size="10" fill="#2B6CB0" font-style="italic">Best for: structure validation</text>

  <!-- HIGH FIDELITY -->
  <rect x="485" y="78" width="215" height="270" rx="10" fill="#F7FAFC" stroke="#F6AD55" stroke-width="2"/>
  <rect x="485" y="78" width="215" height="32" rx="10" fill="#D69E2E"/>
  <rect x="485" y="96" width="215" height="14" fill="#D69E2E"/>
  <text x="593" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">High Fidelity</text>
  <text x="593" y="114" text-anchor="middle" font-size="10" fill="white">Detailed spacing &amp; interaction</text>
  <!-- Mock wireframe - detailed -->
  <rect x="501" y="124" width="183" height="90" rx="4" fill="white" stroke="#F6AD55" stroke-width="1.5"/>
  <rect x="507" y="130" width="171" height="14" rx="2" fill="#FEEBC8"/>
  <text x="593" y="141" text-anchor="middle" font-size="8" fill="#744210">🏷  Brand Name  [Home] [About] [Pricing]  [Sign Up ▶]</text>
  <rect x="507" y="150" width="55" height="40" rx="2" fill="#FFFBEB" stroke="#F6AD55" stroke-width="1"/>
  <text x="534" y="163" text-anchor="middle" font-size="7" fill="#744210">Filter</text>
  <text x="534" y="175" text-anchor="middle" font-size="7" fill="#744210">Panel</text>
  <rect x="568" y="150" width="110" height="18" rx="2" fill="#FFFBEB" stroke="#F6AD55" stroke-width="1"/>
  <text x="623" y="163" text-anchor="middle" font-size="7" fill="#744210">Card: Title · 14px · Weight 600</text>
  <rect x="568" y="172" width="110" height="18" rx="2" fill="#FFFBEB" stroke="#F6AD55" stroke-width="1"/>
  <text x="623" y="185" text-anchor="middle" font-size="7" fill="#744210">Body text · 12px · Spacing 1.5</text>
  <rect x="507" y="196" width="171" height="12" rx="2" fill="#FEEBC8"/>
  <text x="593" y="205" text-anchor="middle" font-size="7" fill="#744210">Footer · links · 10px · muted</text>
  <!-- pros/cons -->
  <text x="501" y="234" font-size="10" font-weight="bold" fill="#38A169">✓ Pros:</text>
  <text x="501" y="250" font-size="10" fill="#4A5568">• Exact spacing and flow</text>
  <text x="501" y="264" font-size="10" fill="#4A5568">• Closest to final product</text>
  <text x="501" y="278" font-size="10" fill="#4A5568">• Supports dev handoff</text>
  <text x="501" y="298" font-size="10" font-weight="bold" fill="#E53E3E">✗ Cons:</text>
  <text x="501" y="314" font-size="10" fill="#4A5568">• Time-consuming to change</text>
  <text x="501" y="328" font-size="10" fill="#4A5568">• Designers get "attached"</text>
  <text x="501" y="340" font-size="10" fill="#744210" font-style="italic">Best for: final prototype</text>

  <!-- Footer -->
  <text x="360" y="363" text-anchor="middle" font-size="10" fill="#A0AEC0">Typical workflow: Low → Medium → High fidelity as structure is confirmed at each stage</text>
</svg>
