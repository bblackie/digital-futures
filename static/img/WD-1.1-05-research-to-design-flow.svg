<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" fill="#e0e0e0" font-size="28" font-weight="700">From Research to Design</text>
  <line x1="340" y1="65" x2="620" y2="65" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <text x="480" y="90" text-anchor="middle" fill="#78909c" font-size="14">Every design decision traces back to user needs</text>

  <!-- Flow line -->
  <line x1="80" y1="250" x2="880" y2="250" stroke="url(#arrow)" stroke-width="3" stroke-dasharray="8 4" opacity="0.3"/>

  <!-- Step 1: Research -->
  <rect x="30" y="130" width="130" height="160" rx="14" fill="#1e2a3a" stroke="#4fc3f7" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="95" cy="170" r="28" fill="#0d47a1" filter="url(#glow)"/>
  <text x="95" y="180" text-anchor="middle" fill="#fff" font-size="24">🔍</text>
  <text x="95" y="220" text-anchor="middle" fill="#4fc3f7" font-size="16" font-weight="700">Research</text>
  <text x="95" y="242" text-anchor="middle" fill="#90a4ae" font-size="11">Discover real</text>
  <text x="95" y="258" text-anchor="middle" fill="#90a4ae" font-size="11">user behaviour</text>
  <text x="95" y="280" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="700">1</text>
  <!-- Arrow -->
  <polygon points="170,210 185,200 185,205 200,205 200,215 185,215 185,220" fill="#4fc3f7" opacity="0.7"/>

  <!-- Step 2: Personas -->
  <rect x="195" y="130" width="130" height="160" rx="14" fill="#2a1e2a" stroke="#ab47bc" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="260" cy="170" r="28" fill="#6a1b9a" filter="url(#glow)"/>
  <text x="260" y="180" text-anchor="middle" fill="#fff" font-size="24">👤</text>
  <text x="260" y="220" text-anchor="middle" fill="#ce93d8" font-size="16" font-weight="700">Personas</text>
  <text x="260" y="242" text-anchor="middle" fill="#90a4ae" font-size="11">Define who</text>
  <text x="260" y="258" text-anchor="middle" fill="#90a4ae" font-size="11">you design for</text>
  <text x="260" y="280" text-anchor="middle" fill="#ab47bc" font-size="11" font-weight="700">2</text>
  <!-- Arrow -->
  <polygon points="335,210 350,200 350,205 365,205 365,215 350,215 350,220" fill="#ab47bc" opacity="0.7"/>

  <!-- Step 3: Goals -->
  <rect x="360" y="130" width="130" height="160" rx="14" fill="#2a2a1e" stroke="#ffa726" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="425" cy="170" r="28" fill="#e65100" filter="url(#glow)"/>
  <text x="425" y="180" text-anchor="middle" fill="#fff" font-size="24">🎯</text>
  <text x="425" y="220" text-anchor="middle" fill="#ffa726" font-size="16" font-weight="700">Goals</text>
  <text x="425" y="242" text-anchor="middle" fill="#90a4ae" font-size="11">What users</text>
  <text x="425" y="258" text-anchor="middle" fill="#90a4ae" font-size="11">need to achieve</text>
  <text x="425" y="280" text-anchor="middle" fill="#ffa726" font-size="11" font-weight="700">3</text>
  <!-- Arrow -->
  <polygon points="500,210 515,200 515,205 530,205 530,215 515,215 515,220" fill="#ffa726" opacity="0.7"/>

  <!-- Step 4: Flows -->
  <rect x="525" y="130" width="130" height="160" rx="14" fill="#1e2a1e" stroke="#66bb6a" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="590" cy="170" r="28" fill="#2e7d32" filter="url(#glow)"/>
  <text x="590" y="180" text-anchor="middle" fill="#fff" font-size="24">🔀</text>
  <text x="590" y="220" text-anchor="middle" fill="#66bb6a" font-size="16" font-weight="700">Flows</text>
  <text x="590" y="242" text-anchor="middle" fill="#90a4ae" font-size="11">Map the user</text>
  <text x="590" y="258" text-anchor="middle" fill="#90a4ae" font-size="11">journey steps</text>
  <text x="590" y="280" text-anchor="middle" fill="#66bb6a" font-size="11" font-weight="700">4</text>
  <!-- Arrow -->
  <polygon points="665,210 680,200 680,205 695,205 695,215 680,215 680,220" fill="#66bb6a" opacity="0.7"/>

  <!-- Step 5: Wireframes -->
  <rect x="690" y="130" width="130" height="160" rx="14" fill="#1e2a3a" stroke="#29b6f6" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="755" cy="170" r="28" fill="#01579b" filter="url(#glow)"/>
  <text x="755" y="180" text-anchor="middle" fill="#fff" font-size="24">📐</text>
  <text x="755" y="220" text-anchor="middle" fill="#29b6f6" font-size="16" font-weight="700">Wireframes</text>
  <text x="755" y="242" text-anchor="middle" fill="#90a4ae" font-size="11">Sketch the</text>
  <text x="755" y="258" text-anchor="middle" fill="#90a4ae" font-size="11">layout structure</text>
  <text x="755" y="280" text-anchor="middle" fill="#29b6f6" font-size="11" font-weight="700">5</text>

  <!-- Curved arrow to Prototype below -->
  <path d="M820 220 Q870 220 870 310 Q870 350 830 350" fill="none" stroke="#ef5350" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="830,343 820,350 830,357" fill="#ef5350"/>

  <!-- Step 6: Prototype (below, highlighted as final) -->
  <rect x="640" y="330" width="180" height="130" rx="16" fill="#2d1e1e" stroke="#ef5350" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="730" cy="370" r="28" fill="#b71c1c" filter="url(#glow)"/>
  <text x="730" y="380" text-anchor="middle" fill="#fff" font-size="24">🚀</text>
  <text x="730" y="415" text-anchor="middle" fill="#ef5350" font-size="18" font-weight="700">Prototype</text>
  <text x="730" y="438" text-anchor="middle" fill="#90a4ae" font-size="12">Interactive, testable design</text>
  <text x="730" y="455" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="700">6 — TEST &amp; ITERATE</text>

  <!-- Key takeaway box -->
  <rect x="40" y="340" width="500" height="100" rx="12" fill="#263238" stroke="#4fc3f7" stroke-width="1" opacity="0.9"/>
  <text x="60" y="375" fill="#4fc3f7" font-size="16" font-weight="700">🔑 Key Takeaway</text>
  <text x="60" y="400" fill="#e0e0e0" font-size="14">Design is not a straight line—you revisit earlier steps</text>
  <text x="60" y="420" fill="#e0e0e0" font-size="14">as you learn more. Every choice connects back to research.</text>

  <!-- Footer -->
  <text x="480" y="515" text-anchor="middle" fill="#78909c" font-size="13">WD-1.1 · User Research &amp; Personas · 13DGT</text>
</svg>