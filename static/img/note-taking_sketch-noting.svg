<svg width="800" height="360" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fff9db" rx="16"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#e67700">Sketch-noting (Visual Notes)</text>
  <rect x="80" y="55" width="640" height="285" rx="10" fill="#fff" stroke="#e67700" stroke-width="1.5"/>
  <!-- Headline -->
  <text x="200" y="95" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e67700">BIG IDEA</text>
  <!-- Icon / doodle - lightbulb -->
  <circle cx="340" cy="88" r="16" fill="none" stroke="#fcc419" stroke-width="2.5"/>
  <line x1="340" y1="72" x2="340" y2="65" stroke="#fcc419" stroke-width="2"/>
  <line x1="328" y1="76" x2="323" y2="71" stroke="#fcc419" stroke-width="2"/>
  <line x1="352" y1="76" x2="357" y2="71" stroke="#fcc419" stroke-width="2"/>
  <text x="340" y="93" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#fcc419">💡</text>
  <!-- Short phrase -->
  <text x="150" y="140" font-family="Arial, sans-serif" font-size="13" fill="#495057">key point here</text>
  <!-- Arrow connecting -->
  <line x1="270" y1="135" x2="340" y2="160" stroke="#e67700" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e67700"/>
    </marker>
  </defs>
  <!-- Another concept -->
  <rect x="310" y="150" width="130" height="40" rx="20" fill="#fff3bf" stroke="#e67700" stroke-width="1.5"/>
  <text x="375" y="175" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#e67700">concept</text>
  <!-- Icon - gear -->
  <text x="500" y="175" font-family="Arial, sans-serif" font-size="28" fill="#868e96">⚙️</text>
  <text x="540" y="175" font-family="Arial, sans-serif" font-size="13" fill="#495057">how it works</text>
  <!-- Arrow down -->
  <line x1="375" y1="195" x2="375" y2="230" stroke="#e67700" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <!-- Example box -->
  <rect x="310" y="235" width="130" height="35" rx="6" fill="#ffec99" stroke="#e67700" stroke-width="1"/>
  <text x="375" y="257" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e67700">example</text>
  <!-- Side doodle - star -->
  <text x="550" y="260" font-family="Arial, sans-serif" font-size="24" fill="#fcc419">⭐</text>
  <text x="580" y="260" font-family="Arial, sans-serif" font-size="12" fill="#868e96">important!</text>
  <!-- Bottom note -->
  <text x="200" y="310" font-family="Arial, sans-serif" font-size="11" fill="#868e96">Words + images + arrows = dual coding = better recall</text>
</svg>