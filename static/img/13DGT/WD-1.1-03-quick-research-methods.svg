<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <!-- Title -->
  <text x="480" y="55" text-anchor="middle" fill="#e0e0e0" font-size="28" font-weight="700">Quick Research Methods</text>
  <line x1="350" y1="70" x2="610" y2="70" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>

  <!-- Method 1: Interviews -->
  <rect x="40" y="100" width="210" height="310" rx="14" fill="#1e2a3a" stroke="#4fc3f7" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="145" cy="145" r="32" fill="#0d47a1"/>
  <text x="145" y="155" text-anchor="middle" fill="#fff" font-size="30">🎤</text>
  <text x="145" y="200" text-anchor="middle" fill="#4fc3f7" font-size="20" font-weight="700">Interviews</text>
  <line x1="80" y1="215" x2="210" y2="215" stroke="#4fc3f7" stroke-width="0.5" opacity="0.4"/>
  <text x="145" y="245" text-anchor="middle" fill="#78909c" font-size="13">⏱ 30 min each</text>
  <text x="145" y="270" text-anchor="middle" fill="#78909c" font-size="13">💰 Low cost</text>
  <line x1="80" y1="285" x2="210" y2="285" stroke="#4fc3f7" stroke-width="0.5" opacity="0.4"/>
  <text x="145" y="310" text-anchor="middle" fill="#b0bec5" font-size="13" font-weight="600">Insight:</text>
  <text x="145" y="330" text-anchor="middle" fill="#e0e0e0" font-size="14" font-style="italic">Why users</text>
  <text x="145" y="350" text-anchor="middle" fill="#e0e0e0" font-size="14" font-style="italic">behave this way</text>
  <!-- Depth meter -->
  <rect x="70" y="375" width="150" height="8" rx="4" fill="#263238"/>
  <rect x="70" y="375" width="140" height="8" rx="4" fill="#4fc3f7"/>
  <text x="145" y="400" text-anchor="middle" fill="#78909c" font-size="10">DEPTH: HIGH</text>

  <!-- Method 2: Observation -->
  <rect x="270" y="100" width="210" height="310" rx="14" fill="#2a1e2a" stroke="#ab47bc" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="375" cy="145" r="32" fill="#6a1b9a"/>
  <text x="375" y="155" text-anchor="middle" fill="#fff" font-size="30">👁️</text>
  <text x="375" y="200" text-anchor="middle" fill="#ce93d8" font-size="20" font-weight="700">Observation</text>
  <line x1="310" y1="215" x2="440" y2="215" stroke="#ab47bc" stroke-width="0.5" opacity="0.4"/>
  <text x="375" y="245" text-anchor="middle" fill="#78909c" font-size="13">⏱ 30 min each</text>
  <text x="375" y="270" text-anchor="middle" fill="#78909c" font-size="13">💰 Low cost</text>
  <line x1="310" y1="285" x2="440" y2="285" stroke="#ab47bc" stroke-width="0.5" opacity="0.4"/>
  <text x="375" y="310" text-anchor="middle" fill="#b0bec5" font-size="13" font-weight="600">Insight:</text>
  <text x="375" y="330" text-anchor="middle" fill="#e0e0e0" font-size="14" font-style="italic">What users</text>
  <text x="375" y="350" text-anchor="middle" fill="#e0e0e0" font-size="14" font-style="italic">actually do</text>
  <!-- Depth meter -->
  <rect x="300" y="375" width="150" height="8" rx="4" fill="#263238"/>
  <rect x="300" y="375" width="130" height="8" rx="4" fill="#ab47bc"/>
  <text x="375" y="400" text-anchor="middle" fill="#78909c" font-size="10">DEPTH: HIGH</text>

  <!-- Method 3: Surveys -->
  <rect x="500" y="100" width="210" height="310" rx="14" fill="#1e2a1e" stroke="#66bb6a" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="605" cy="145" r="32" fill="#2e7d32"/>
  <text x="605" y="155" text-anchor="middle" fill="#fff" font-size="30">📋</text>
  <text x="605" y="200" text-anchor="middle" fill="#66bb6a" font-size="20" font-weight="700">Surveys</text>
  <line x1="540" y1="215" x2="670" y2="215" stroke="#66bb6a" stroke-width="0.5" opacity="0.4"/>
  <text x="605" y="245" text-anchor="middle" fill="#78909c" font-size="13">⏱ 15 min each</text>
  <text x="605" y="270" text-anchor="middle" fill="#78909c" font-size="13">💰 Low cost</text>
  <line x1="540" y1="285" x2="670" y2="285" stroke="#66bb6a" stroke-width="0.5" opacity="0.4"/>
  <text x="605" y="310" text-anchor="middle" fill="#b0bec5" font-size="13" font-weight="600">Insight:</text>
  <text x="605" y="330" text-anchor="middle" fill="#e0e0e0" font-size="14" font-style="italic">Patterns across</text>
  <text x="605" y="350" text-anchor="middle" fill="#e0e0e0" font-size="14" font-style="italic">many people</text>
  <!-- Depth meter -->
  <rect x="530" y="375" width="150" height="8" rx="4" fill="#263238"/>
  <rect x="530" y="375" width="90" height="8" rx="4" fill="#66bb6a"/>
  <text x="605" y="400" text-anchor="middle" fill="#78909c" font-size="10">DEPTH: MEDIUM</text>

  <!-- Method 4: Card Sorting -->
  <rect x="730" y="100" width="210" height="310" rx="14" fill="#2a2a1e" stroke="#ffa726" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="835" cy="145" r="32" fill="#e65100"/>
  <text x="835" y="155" text-anchor="middle" fill="#fff" font-size="30">🃏</text>
  <text x="835" y="200" text-anchor="middle" fill="#ffa726" font-size="20" font-weight="700">Card Sorting</text>
  <line x1="770" y1="215" x2="900" y2="215" stroke="#ffa726" stroke-width="0.5" opacity="0.4"/>
  <text x="835" y="245" text-anchor="middle" fill="#78909c" font-size="13">⏱ 20 min each</text>
  <text x="835" y="270" text-anchor="middle" fill="#78909c" font-size="13">💰 Low cost</text>
  <line x1="770" y1="285" x2="900" y2="285" stroke="#ffa726" stroke-width="0.5" opacity="0.4"/>
  <text x="835" y="310" text-anchor="middle" fill="#b0bec5" font-size="13" font-weight="600">Insight:</text>
  <text x="835" y="330" text-anchor="middle" fill="#e0e0e0" font-size="14" font-style="italic">How users organize</text>
  <text x="835" y="350" text-anchor="middle" fill="#e0e0e0" font-size="14" font-style="italic">information</text>
  <!-- Depth meter -->
  <rect x="760" y="375" width="150" height="8" rx="4" fill="#263238"/>
  <rect x="760" y="375" width="110" height="8" rx="4" fill="#ffa726"/>
  <text x="835" y="400" text-anchor="middle" fill="#78909c" font-size="10">DEPTH: MEDIUM-HIGH</text>

  <!-- Callout -->
  <rect x="240" y="440" width="480" height="45" rx="10" fill="#263238" stroke="#4fc3f7" stroke-width="1" opacity="0.9"/>
  <text x="480" y="468" text-anchor="middle" fill="#4fc3f7" font-size="16" font-weight="600">💡 3–5 users reveal 85% of usability problems. Start small.</text>

  <!-- Footer -->
  <text x="480" y="520" text-anchor="middle" fill="#78909c" font-size="13">WD-1.1 · User Research &amp; Personas · 13DGT</text>
</svg>