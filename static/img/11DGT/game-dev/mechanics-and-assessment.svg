<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Mechanics and Assessment</title>
  <desc id="desc">An assessment board showing correct function, fit to purpose, and development changes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b1c10"/>
      <stop offset="100%" stop-color="#6c4824"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="96" fill="#fff7ef" font-family="Verdana, sans-serif" font-size="44" text-anchor="middle">Mechanics and Assessment</text>
  <rect x="220" y="160" width="840" height="430" rx="26" fill="#fff7ef"/>
  <rect x="290" y="225" width="700" height="76" rx="14" fill="#f4d9bd"/>
  <rect x="290" y="337" width="700" height="76" rx="14" fill="#efc79e"/>
  <rect x="290" y="449" width="700" height="76" rx="14" fill="#e7b27d"/>
  <circle cx="332" cy="263" r="18" fill="#4f321d"/>
  <circle cx="332" cy="375" r="18" fill="#4f321d"/>
  <circle cx="332" cy="487" r="18" fill="#4f321d"/>
  <text x="660" y="274" fill="#3f2817" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Mechanics function correctly</text>
  <text x="660" y="386" fill="#3f2817" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Mechanics support the game's purpose</text>
  <text x="660" y="498" fill="#3f2817" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Mechanics improve through development</text>
  <text x="640" y="640" fill="#fff7ef" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">More mechanics do not automatically mean a better game if they do not improve the experience.</text>
</svg>