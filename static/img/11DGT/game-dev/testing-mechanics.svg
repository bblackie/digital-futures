<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Testing Mechanics</title>
  <desc id="desc">A testing checklist showing reliability, input response, and edge case behaviour.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162016"/>
      <stop offset="100%" stop-color="#3e6641"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="96" fill="#f2fbf2" font-family="Verdana, sans-serif" font-size="44" text-anchor="middle">Testing Mechanics</text>
  <rect x="250" y="170" width="780" height="410" rx="26" fill="#f2fbf2"/>
  <rect x="320" y="240" width="640" height="78" rx="14" fill="#72efdd"/>
  <rect x="320" y="350" width="640" height="78" rx="14" fill="#ffd166"/>
  <rect x="320" y="460" width="640" height="78" rx="14" fill="#ff8fab"/>
  <path d="M355 280 l18 18 l34 -34" fill="none" stroke="#254028" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M355 390 l18 18 l34 -34" fill="none" stroke="#4a3a00" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M355 500 l18 18 l34 -34" fill="none" stroke="#57192c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="650" y="288" fill="#123733" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Works every time</text>
  <text x="650" y="398" fill="#403000" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Responds correctly to input</text>
  <text x="650" y="508" fill="#57192c" font-family="Verdana, sans-serif" font-size="28" text-anchor="middle">Handles edge cases</text>
  <text x="640" y="640" fill="#f2fbf2" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Testing often reveals logic mistakes, balance problems, and usability issues before they grow.</text>
</svg>