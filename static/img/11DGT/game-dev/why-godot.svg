<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Why Godot?</title>
  <desc id="desc">A four-part panel showing free, flexible, readable, and well-structured qualities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101524"/>
      <stop offset="100%" stop-color="#1f5b8f"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="100" fill="#f3f8ff" font-family="Verdana, sans-serif" font-size="46" text-anchor="middle">Why Godot?</text>
  <rect x="160" y="190" width="420" height="140" rx="26" fill="#72efdd"/>
  <rect x="700" y="190" width="420" height="140" rx="26" fill="#ffd166"/>
  <rect x="160" y="390" width="420" height="140" rx="26" fill="#ff8fab"/>
  <rect x="700" y="390" width="420" height="140" rx="26" fill="#9ccc65"/>
  <text x="370" y="255" fill="#103733" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">Free and open source</text>
  <text x="910" y="255" fill="#403000" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">2D and 3D support</text>
  <text x="370" y="455" fill="#5a1c31" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">Readable scripting</text>
  <text x="910" y="455" fill="#2f401d" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">Encourages structure</text>
  <text x="640" y="635" fill="#f3f8ff" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Godot is capable enough for real projects without being overwhelming for beginners.</text>
</svg>