<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">What Is a Game Mechanic?</title>
  <desc id="desc">A mechanic shown as a rule-based interaction linking player actions to game responses and outcomes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2030"/>
      <stop offset="100%" stop-color="#24536f"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="98" fill="#eef7fb" font-family="Verdana, sans-serif" font-size="44" text-anchor="middle">What Is a Game Mechanic?</text>
  <rect x="140" y="275" width="240" height="150" rx="24" fill="#ffd166"/>
  <rect x="520" y="275" width="240" height="150" rx="24" fill="#72efdd"/>
  <rect x="900" y="275" width="240" height="150" rx="24" fill="#ff8fab"/>
  <line x1="380" y1="350" x2="520" y2="350" stroke="#eef7fb" stroke-width="10" stroke-linecap="round"/>
  <line x1="760" y1="350" x2="900" y2="350" stroke="#eef7fb" stroke-width="10" stroke-linecap="round"/>
  <text x="260" y="342" fill="#3a2a00" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">Player</text>
  <text x="260" y="378" fill="#3a2a00" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">action</text>
  <text x="640" y="342" fill="#123733" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">Rule</text>
  <text x="640" y="378" fill="#123733" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">and logic</text>
  <text x="1020" y="342" fill="#57192c" font-family="Verdana, sans-serif" font-size="30" text-anchor="middle">Game</text>
  <text x="1020" y="378" fill="#57192c" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">response</text>
  <text x="640" y="615" fill="#eef7fb" font-family="Verdana, sans-serif" font-size="24" text-anchor="middle">Mechanics connect what the player does to what the game allows and returns.</text>
</svg>