<svg width="780" height="420" viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="780" height="420" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="778" height="418" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A202C">Six UX Methodologies</text>
  <text x="390" y="56" text-anchor="middle" font-size="12" fill="#718096">Investigate at least two for AS91901 — choose what best suits your project context</text>

  <!-- ── Row 1 ── -->

  <!-- Card 1: User Research -->
  <rect x="18" y="72" width="232" height="152" rx="10" fill="#F0FFF4" stroke="#68D391" stroke-width="2"/>
  <rect x="18" y="72" width="232" height="34" rx="10" fill="#68D391"/>
  <rect x="18" y="92" width="232" height="14" fill="#68D391"/>
  <text x="134" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#1C4532">① User Research</text>
  <text x="134" y="124" text-anchor="middle" font-size="11" fill="#276749" font-weight="bold">Understand your users</text>
  <text x="26" y="143" font-size="10" fill="#2F855A">• Interviews, surveys, observation</text>
  <text x="26" y="159" font-size="10" fill="#2F855A">• Reveals real needs and pain points</text>
  <text x="26" y="175" font-size="10" fill="#2F855A">• Foundation for all design decisions</text>
  <text x="26" y="191" font-size="10" fill="#2F855A">• Required: Explain end-user requirements</text>
  <text x="26" y="210" font-size="10" fill="#276749" font-style="italic">Relevance: Define what to build</text>

  <!-- Card 2: Information Architecture -->
  <rect x="274" y="72" width="232" height="152" rx="10" fill="#EBF8FF" stroke="#63B3ED" stroke-width="2"/>
  <rect x="274" y="72" width="232" height="34" rx="10" fill="#63B3ED"/>
  <rect x="274" y="92" width="232" height="14" fill="#63B3ED"/>
  <text x="390" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A365D">② Information Architecture</text>
  <text x="390" y="124" text-anchor="middle" font-size="11" fill="#2C5282" font-weight="bold">Structure &amp; navigation skeleton</text>
  <text x="282" y="143" font-size="10" fill="#2B6CB0">• Site maps and data flow diagrams</text>
  <text x="282" y="159" font-size="10" fill="#2B6CB0">• Organizes how content is grouped</text>
  <text x="282" y="175" font-size="10" fill="#2B6CB0">• Critical for APIs and databases</text>
  <text x="282" y="191" font-size="10" fill="#2B6CB0">• Enables logical data fetching</text>
  <text x="282" y="210" font-size="10" fill="#2C5282" font-style="italic">Relevance: Plan before you code</text>

  <!-- Card 3: UI Design -->
  <rect x="530" y="72" width="232" height="152" rx="10" fill="#FFF5F7" stroke="#FC8181" stroke-width="2"/>
  <rect x="530" y="72" width="232" height="34" rx="10" fill="#FC8181"/>
  <rect x="530" y="92" width="232" height="14" fill="#FC8181"/>
  <text x="646" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#63171B">③ UI Design</text>
  <text x="646" y="124" text-anchor="middle" font-size="11" fill="#9B2335" font-weight="bold">Visual interface design</text>
  <text x="538" y="143" font-size="10" fill="#C53030">• Sketches and hi-fi mockups</text>
  <text x="538" y="159" font-size="10" fill="#C53030">• Applies design guidelines and grids</text>
  <text x="538" y="175" font-size="10" fill="#C53030">• Colour, typography, layout</text>
  <text x="538" y="191" font-size="10" fill="#C53030">• Where buttons and displays go</text>
  <text x="538" y="210" font-size="10" fill="#9B2335" font-style="italic">Relevance: Design before coding CSS</text>

  <!-- ── Row 2 ── -->

  <!-- Card 4: Interaction Design -->
  <rect x="18" y="242" width="232" height="152" rx="10" fill="#FAF5FF" stroke="#B794F4" stroke-width="2"/>
  <rect x="18" y="242" width="232" height="34" rx="10" fill="#B794F4"/>
  <rect x="18" y="262" width="232" height="14" fill="#B794F4"/>
  <text x="134" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#44337A">④ Interaction Design</text>
  <text x="134" y="294" text-anchor="middle" font-size="11" fill="#553C9A" font-weight="bold">Behaviour and system response</text>
  <text x="26" y="313" font-size="10" fill="#6B46C1">• Designing states (loading, error, success)</text>
  <text x="26" y="329" font-size="10" fill="#6B46C1">• "What happens when user clicks X?"</text>
  <text x="26" y="345" font-size="10" fill="#6B46C1">• Micro-animations and feedback</text>
  <text x="26" y="361" font-size="10" fill="#6B46C1">• Transitions between app views</text>
  <text x="26" y="380" font-size="10" fill="#553C9A" font-style="italic">Relevance: Makes apps feel professional</text>

  <!-- Card 5: Usability Evaluation -->
  <rect x="274" y="242" width="232" height="152" rx="10" fill="#FFFBEB" stroke="#F6AD55" stroke-width="2"/>
  <rect x="274" y="242" width="232" height="34" rx="10" fill="#F6AD55"/>
  <rect x="274" y="262" width="232" height="14" fill="#F6AD55"/>
  <text x="390" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#744210">⑤ Usability Evaluation</text>
  <text x="390" y="294" text-anchor="middle" font-size="11" fill="#92400E" font-weight="bold">Testing with real people</text>
  <text x="282" y="313" font-size="10" fill="#B45309">• Paper sketches to classmates first</text>
  <text x="282" y="329" font-size="10" fill="#B45309">• "How would you find settings?"</text>
  <text x="282" y="345" font-size="10" fill="#B45309">• Collect and summarise data</text>
  <text x="282" y="361" font-size="10" fill="#B45309">• Use evidence to improve design</text>
  <text x="282" y="380" font-size="10" fill="#92400E" font-style="italic">Relevance: Required evidence for AS91901</text>

  <!-- Card 6: Accessibility -->
  <rect x="530" y="242" width="232" height="152" rx="10" fill="#FFFFF0" stroke="#68D391" stroke-width="2"/>
  <rect x="530" y="242" width="232" height="34" rx="10" fill="#4FD1C5"/>
  <rect x="530" y="262" width="232" height="14" fill="#4FD1C5"/>
  <text x="646" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4044">⑥ Accessibility</text>
  <text x="646" y="294" text-anchor="middle" font-size="11" fill="#285E61" font-weight="bold">Designing for everyone</text>
  <text x="538" y="313" font-size="10" fill="#2C7A7B">• Colour contrast, font size, keyboard nav</text>
  <text x="538" y="329" font-size="10" fill="#2C7A7B">• WCAG 2.1 Level AA compliance</text>
  <text x="538" y="345" font-size="10" fill="#2C7A7B">• Universal design benefits all users</text>
  <text x="538" y="361" font-size="10" fill="#2C7A7B">• Key implication at Level 3</text>
  <text x="538" y="380" font-size="10" fill="#285E61" font-style="italic">Relevance: Minimum threshold, not optional</text>

  <!-- Footer -->
  <text x="390" y="412" text-anchor="middle" font-size="10" fill="#A0AEC0">Level 3 UX — AS91901 | Investigate at least 2 methodologies and justify your choices</text>
</svg>
