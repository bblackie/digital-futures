<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <!-- Title -->
  <text x="480" y="55" text-anchor="middle" fill="#e0e0e0" font-size="28" font-weight="700">Why User Research Matters</text>
  <line x1="360" y1="70" x2="600" y2="70" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>

  <!-- Card 1: Users are not designers -->
  <rect x="40" y="100" width="420" height="170" rx="14" fill="#1e2a3a" stroke="#4fc3f7" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="80" cy="140" r="24" fill="#0d47a1"/>
  <text x="80" y="147" text-anchor="middle" fill="#fff" font-size="22">👥</text>
  <text x="115" y="145" fill="#4fc3f7" font-size="20" font-weight="700">Users Are Not Designers</text>
  <text x="70" y="180" fill="#b0bec5" font-size="15">Users have different goals, contexts, and pain</text>
  <text x="70" y="200" fill="#b0bec5" font-size="15">points. They don't think like you do.</text>
  <!-- Illustration: two different thought bubbles -->
  <circle cx="380" cy="220" r="20" fill="#263238" stroke="#4fc3f7" stroke-width="1"/>
  <text x="380" y="226" text-anchor="middle" fill="#4fc3f7" font-size="12">Goal A</text>
  <circle cx="420" cy="200" r="20" fill="#263238" stroke="#ff7043" stroke-width="1"/>
  <text x="420" y="206" text-anchor="middle" fill="#ff7043" font-size="12">Goal B</text>

  <!-- Card 2: You are biased -->
  <rect x="500" y="100" width="420" height="170" rx="14" fill="#2a1e2a" stroke="#ab47bc" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="540" cy="140" r="24" fill="#6a1b9a"/>
  <text x="540" y="148" text-anchor="middle" fill="#fff" font-size="22">🧠</text>
  <text x="575" y="145" fill="#ce93d8" font-size="20" font-weight="700">You Are Biased</text>
  <text x="530" y="180" fill="#b0bec5" font-size="15">You know your design intimately.</text>
  <text x="530" y="200" fill="#b0bec5" font-size="15">Users see it for the first time—fresh eyes.</text>
  <!-- Bias icon: eye with filter -->
  <ellipse cx="850" cy="210" rx="28" ry="16" fill="none" stroke="#ce93d8" stroke-width="1.5"/>
  <circle cx="850" cy="210" r="8" fill="#ce93d8" opacity="0.5"/>
  <line x1="830" y1="195" x2="870" y2="225" stroke="#e53935" stroke-width="2" opacity="0.6"/>

  <!-- Card 3: Testing prevents waste -->
  <rect x="40" y="300" width="420" height="170" rx="14" fill="#1e2a1e" stroke="#66bb6a" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="80" cy="340" r="24" fill="#2e7d32"/>
  <text x="80" y="348" text-anchor="middle" fill="#fff" font-size="22">🛡️</text>
  <text x="115" y="345" fill="#66bb6a" font-size="20" font-weight="700">Testing Prevents Waste</text>
  <text x="70" y="380" fill="#b0bec5" font-size="15">Find problems early in the process,</text>
  <text x="70" y="400" fill="#b0bec5" font-size="15">not after launch when fixes cost 10×.</text>
  <!-- Cost chart mini -->
  <rect x="360" y="405" width="16" height="20" fill="#66bb6a" rx="2"/>
  <rect x="382" y="385" width="16" height="40" fill="#ffb74d" rx="2"/>
  <rect x="404" y="365" width="16" height="60" fill="#e53935" rx="2"/>
  <text x="360" y="440" fill="#78909c" font-size="9">Early</text>
  <text x="380" y="440" fill="#78909c" font-size="9">Mid</text>
  <text x="400" y="440" fill="#78909c" font-size="9">Late</text>

  <!-- Card 4: Evidence beats assumptions -->
  <rect x="500" y="300" width="420" height="170" rx="14" fill="#2a2a1e" stroke="#ffa726" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="540" cy="340" r="24" fill="#e65100"/>
  <text x="540" y="348" text-anchor="middle" fill="#fff" font-size="22">📊</text>
  <text x="575" y="345" fill="#ffa726" font-size="20" font-weight="700">Evidence Beats Assumptions</text>
  <text x="530" y="380" fill="#b0bec5" font-size="15">Research reveals what you can't see</text>
  <text x="530" y="400" fill="#b0bec5" font-size="15">from behind your desk. Data &gt; opinions.</text>
  <!-- Data chart mini -->
  <rect x="850" y="410" width="8" height="30" fill="#ffa726" rx="2"/>
  <rect x="863" y="395" width="8" height="45" fill="#ffa726" rx="2"/>
  <rect x="876" y="385" width="8" height="55" fill="#ffa726" rx="2"/>
  <rect x="889" y="370" width="8" height="70" fill="#ffa726" rx="2"/>

  <!-- Footer -->
  <text x="480" y="510" text-anchor="middle" fill="#78909c" font-size="13">WD-1.1 · User Research &amp; Personas · 13DGT</text>
</svg>