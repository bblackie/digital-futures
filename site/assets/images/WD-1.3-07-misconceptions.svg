<svg width="700" height="360" viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="360" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="698" height="358" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <text x="350" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A202C">Common Misconceptions: Visual Design</text>
  <text x="350" y="50" text-anchor="middle" font-size="11" fill="#718096">These errors account for most visual design failures in student prototypes</text>

  <!-- Misconception 1: Beautiful = Good -->
  <rect x="18" y="64" width="322" height="128" rx="10" fill="#FFF5F7" stroke="#FC8181" stroke-width="2"/>
  <rect x="18" y="64" width="322" height="34" rx="10" fill="#FC8181"/>
  <rect x="18" y="82" width="322" height="16" fill="#FC8181"/>
  <text x="30" y="85" font-size="11" font-weight="bold" fill="white">✗ 1</text>
  <text x="179" y="99" text-anchor="middle" font-size="10" fill="white" font-style="italic">"Beautiful design = good design"</text>
  <text x="28" y="120" font-size="10" fill="#9B2335" font-weight="bold">Why it's wrong:</text>
  <text x="28" y="136" font-size="10" fill="#C53030">A gorgeous purple-and-pink palette looks cool but fails contrast checks. Beautiful ≠ usable.</text>
  <rect x="28" y="148" width="294" height="34" rx="6" fill="#FFF0F0" stroke="#E53E3E" stroke-width="1"/>
  <text x="28" y="163" font-size="10" fill="#1A202C" dx="8" font-weight="bold">✓ Correct:</text>
  <text x="36" y="176" font-size="10" fill="#4A5568">Design serves function. A design must be beautiful AND usable — both, not one.</text>

  <!-- Misconception 2: More colour = more interesting -->
  <rect x="360" y="64" width="322" height="128" rx="10" fill="#FAF5FF" stroke="#B794F4" stroke-width="2"/>
  <rect x="360" y="64" width="322" height="34" rx="10" fill="#805AD5"/>
  <rect x="360" y="82" width="322" height="16" fill="#805AD5"/>
  <text x="372" y="85" font-size="11" font-weight="bold" fill="white">✗ 2</text>
  <text x="521" y="99" text-anchor="middle" font-size="10" fill="white" font-style="italic">"More colour = more interesting"</text>
  <text x="370" y="120" font-size="10" fill="#553C9A" font-weight="bold">Why it's wrong:</text>
  <text x="370" y="136" font-size="10" fill="#6B46C1">Too many colours create visual chaos. The eye has no clear focal point to rest on.</text>
  <rect x="370" y="148" width="294" height="34" rx="6" fill="#F3E8FF" stroke="#805AD5" stroke-width="1"/>
  <text x="370" y="163" font-size="10" fill="#1A202C" dx="8" font-weight="bold">✓ Correct:</text>
  <text x="378" y="176" font-size="10" fill="#4A5568">Limit your palette: 1 primary + 1–2 accents + neutrals. Fewer colours = more impact per use.</text>

  <!-- Misconception 3: Users read top-to-bottom -->
  <rect x="18" y="208" width="322" height="128" rx="10" fill="#FFFBEB" stroke="#F6AD55" stroke-width="2"/>
  <rect x="18" y="208" width="322" height="34" rx="10" fill="#D69E2E"/>
  <rect x="18" y="226" width="322" height="16" fill="#D69E2E"/>
  <text x="30" y="229" font-size="11" font-weight="bold" fill="white">✗ 3</text>
  <text x="179" y="243" text-anchor="middle" font-size="10" fill="white" font-style="italic">"Users read websites top-to-bottom, left-to-right"</text>
  <text x="28" y="264" font-size="10" fill="#92400E" font-weight="bold">Why it's wrong:</text>
  <text x="28" y="280" font-size="10" fill="#B45309">Users scan quickly, hunting for landmarks. They jump around, skipping full paragraphs.</text>
  <rect x="28" y="292" width="294" height="34" rx="6" fill="#FFFDE7" stroke="#D69E2E" stroke-width="1"/>
  <text x="28" y="307" font-size="10" fill="#1A202C" dx="8" font-weight="bold">✓ Correct:</text>
  <text x="36" y="320" font-size="10" fill="#4A5568">Use hierarchy to guide scanning — clear headings, prominent CTAs, visible landmarks.</text>

  <!-- Misconception 4: All users see colour the same way -->
  <rect x="360" y="208" width="322" height="128" rx="10" fill="#E6FFFA" stroke="#4FD1C5" stroke-width="2"/>
  <rect x="360" y="208" width="322" height="34" rx="10" fill="#319795"/>
  <rect x="360" y="226" width="322" height="16" fill="#319795"/>
  <text x="372" y="229" font-size="11" font-weight="bold" fill="white">✗ 4</text>
  <text x="521" y="243" text-anchor="middle" font-size="10" fill="white" font-style="italic">"All users see colour the same way"</text>
  <text x="370" y="264" font-size="10" fill="#1D4044" font-weight="bold">Why it's wrong:</text>
  <text x="370" y="280" font-size="10" fill="#2C7A7B">8% of men and 0.5% of women are colourblind. More experience low vision or astigmatism.</text>
  <rect x="370" y="292" width="294" height="34" rx="6" fill="#C6F6D5" stroke="#38A169" stroke-width="1"/>
  <text x="370" y="307" font-size="10" fill="#1A202C" dx="8" font-weight="bold">✓ Correct:</text>
  <text x="378" y="320" font-size="10" fill="#4A5568">Don't rely on colour alone. Pair it with shape, size, text, or icon to convey meaning.</text>

  <text x="350" y="352" text-anchor="middle" font-size="10" fill="#A0AEC0">Your design critique will probe all four of these — be ready to justify every choice with evidence</text>
</svg>
