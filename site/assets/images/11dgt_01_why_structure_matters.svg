<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  <line x1="400" y1="50" x2="400" y2="350" stroke="#dee2e6" stroke-width="2"/>
  
  <text x="200" y="50" font-family="Arial" font-size="24" text-anchor="middle" fill="#c92a2a" fontWeight="bold">Chaos</text>
  <text x="600" y="50" font-family="Arial" font-size="24" text-anchor="middle" fill="#2b8a3e" fontWeight="bold">Order</text>
  
  <!-- Chaos side -->
  <path d="M100,100 Q200,150 150,250 T250,300" stroke="#fa5252" stroke-width="3" fill="none"/>
  <text x="200" y="350" font-family="Arial" font-size="16" text-anchor="middle" fill="#fa5252">Hard to Debug</text>
  
  <!-- Order side -->
  <rect x="500" y="100" width="200" height="40" fill="#8ce99a" stroke="#2b8a3e"/>
  <rect x="500" y="150" width="200" height="40" fill="#8ce99a" stroke="#2b8a3e"/>
  <rect x="500" y="200" width="200" height="40" fill="#8ce99a" stroke="#2b8a3e"/>
  <text x="600" y="350" font-family="Arial" font-size="16" text-anchor="middle" fill="#2b8a3e">Easy to Explain</text>
</svg>