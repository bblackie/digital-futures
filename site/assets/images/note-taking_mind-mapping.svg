<svg width="800" height="360" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#e6fcf5" rx="16"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#0b7285">Mind Mapping</text>
  <!-- Central node -->
  <ellipse cx="400" cy="190" rx="80" ry="35" fill="#0b7285" opacity="0.9"/>
  <text x="400" y="195" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">Main Topic</text>
  <!-- Branch 1 - top left -->
  <line x1="340" y1="165" x2="200" y2="95" stroke="#15aabf" stroke-width="3"/>
  <ellipse cx="200" cy="90" rx="65" ry="25" fill="#15aabf" opacity="0.8"/>
  <text x="200" y="95" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#fff">Sub-topic A</text>
  <line x1="150" y1="75" x2="90" y2="55" stroke="#99e9f2" stroke-width="2"/>
  <text x="75" y="50" font-family="Arial, sans-serif" font-size="11" fill="#0b7285">Detail</text>
  <!-- Branch 2 - top right -->
  <line x1="460" y1="165" x2="600" y2="95" stroke="#f783ac" stroke-width="3"/>
  <ellipse cx="600" cy="90" rx="65" ry="25" fill="#f783ac" opacity="0.8"/>
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#fff">Sub-topic B</text>
  <line x1="650" y1="75" x2="710" y2="55" stroke="#fcc2d7" stroke-width="2"/>
  <text x="725" y="50" font-family="Arial, sans-serif" font-size="11" fill="#a61e4d">Detail</text>
  <!-- Branch 3 - bottom left -->
  <line x1="340" y1="215" x2="200" y2="285" stroke="#fcc419" stroke-width="3"/>
  <ellipse cx="200" cy="290" rx="65" ry="25" fill="#fcc419" opacity="0.8"/>
  <text x="200" y="295" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">Sub-topic C</text>
  <line x1="150" y1="305" x2="90" y2="325" stroke="#ffe066" stroke-width="2"/>
  <text x="75" y="335" font-family="Arial, sans-serif" font-size="11" fill="#e67700">Detail</text>
  <!-- Branch 4 - bottom right -->
  <line x1="460" y1="215" x2="600" y2="285" stroke="#69db7c" stroke-width="3"/>
  <ellipse cx="600" cy="290" rx="65" ry="25" fill="#69db7c" opacity="0.8"/>
  <text x="600" y="295" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">Sub-topic D</text>
  <line x1="650" y1="305" x2="710" y2="325" stroke="#b2f2bb" stroke-width="2"/>
  <text x="725" y="335" font-family="Arial, sans-serif" font-size="11" fill="#2b8a3e">Detail</text>
</svg>