<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#e7f5ff" rx="16"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1864ab">The Charting Method</text>
  <!-- Table -->
  <rect x="80" y="60" width="640" height="220" rx="6" fill="#fff" stroke="#1864ab" stroke-width="1.5"/>
  <!-- Header row -->
  <rect x="80" y="60" width="640" height="40" rx="6" fill="#1864ab"/>
  <rect x="80" y="90" width="640" height="10" fill="#1864ab"/>
  <line x1="240" y1="60" x2="240" y2="280" stroke="#d0ebff" stroke-width="1.5"/>
  <line x1="400" y1="60" x2="400" y2="280" stroke="#d0ebff" stroke-width="1.5"/>
  <line x1="560" y1="60" x2="560" y2="280" stroke="#d0ebff" stroke-width="1.5"/>
  <text x="160" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">Category</text>
  <text x="320" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">Feature A</text>
  <text x="480" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">Feature B</text>
  <text x="640" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">Feature C</text>
  <!-- Row lines -->
  <line x1="80" y1="140" x2="720" y2="140" stroke="#d0ebff" stroke-width="1"/>
  <line x1="80" y1="180" x2="720" y2="180" stroke="#d0ebff" stroke-width="1"/>
  <line x1="80" y1="220" x2="720" y2="220" stroke="#d0ebff" stroke-width="1"/>
  <!-- Data rows -->
  <text x="160" y="125" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#495057">Item 1</text>
  <text x="320" y="125" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#495057">✓ Yes</text>
  <text x="480" y="125" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#495057">✗ No</text>
  <text x="640" y="125" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#495057">✓ Yes</text>
  <text x="160" y="165" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#495057">Item 2</text>
  <text x="320" y="165" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#495057">✗ No</text>
  <text x="480" y="165" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#495057">✓ Yes</text>
  <text x="640" y="165" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#495057">✓ Yes</text>
  <text x="160" y="205" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#495057">Item 3</text>
  <text x="320" y="205" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#868e96">…</text>
  <text x="480" y="205" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#868e96">…</text>
  <text x="640" y="205" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#868e96">…</text>
  <!-- Caption -->
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1864ab">Compare at a glance — differences and similarities jump out</text>
</svg>