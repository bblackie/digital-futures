<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="680" height="340" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="678" height="338" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A202C">User Flow: What to Look For</text>
  <text x="340" y="50" text-anchor="middle" font-size="11" fill="#718096">A user flow diagram reveals friction, drop-off risk, and questions before they become real problems</text>

  <!-- Three analysis lenses -->

  <!-- Lens 1: Where do users get stuck? -->
  <rect x="20" y="66" width="202" height="240" rx="10" fill="#FFFBEB" stroke="#F6AD55" stroke-width="2"/>
  <rect x="20" y="66" width="202" height="44" rx="10" fill="#F6AD55"/>
  <rect x="20" y="92" width="202" height="18" fill="#F6AD55"/>
  <text x="121" y="89" text-anchor="middle" font-size="22">🚧</text>
  <text x="121" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#744210">Where do users</text>
  <text x="121" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="#744210">get stuck?</text>
  <text x="30" y="148" font-size="10" fill="#92400E" font-weight="bold">Look for:</text>
  <text x="30" y="165" font-size="10" fill="#744210">• Decision points with too many</text>
  <text x="30" y="180" font-size="10" fill="#744210">  options (choice overload)</text>
  <text x="30" y="196" font-size="10" fill="#744210">• Steps requiring information</text>
  <text x="30" y="211" font-size="10" fill="#744210">  users don't have yet</text>
  <text x="30" y="227" font-size="10" fill="#744210">• Long sequences with no</text>
  <text x="30" y="242" font-size="10" fill="#744210">  visible progress indicator</text>
  <rect x="30" y="257" width="172" height="36" rx="6" fill="#FEF3C7" stroke="#D69E2E" stroke-width="1"/>
  <text x="116" y="272" text-anchor="middle" font-size="9" fill="#744210" font-style="italic">Fix: Simplify the step, provide</text>
  <text x="116" y="286" text-anchor="middle" font-size="9" fill="#744210" font-style="italic">guidance text, or break it up.</text>

  <!-- Lens 2: What questions do users ask? -->
  <rect x="238" y="66" width="202" height="240" rx="10" fill="#EBF8FF" stroke="#63B3ED" stroke-width="2"/>
  <rect x="238" y="66" width="202" height="44" rx="10" fill="#63B3ED"/>
  <rect x="238" y="92" width="202" height="18" fill="#63B3ED"/>
  <text x="339" y="89" text-anchor="middle" font-size="22">💬</text>
  <text x="339" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A365D">What questions do</text>
  <text x="339" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A365D">users ask?</text>
  <text x="248" y="148" font-size="10" fill="#2C5282" font-weight="bold">Look for:</text>
  <text x="248" y="165" font-size="10" fill="#2B6CB0">• "Is this safe / secure?"</text>
  <text x="248" y="181" font-size="10" fill="#2B6CB0">  (trust signals missing)</text>
  <text x="248" y="197" font-size="10" fill="#2B6CB0">• "How long will this take?"</text>
  <text x="248" y="213" font-size="10" fill="#2B6CB0">  (no progress feedback)</text>
  <text x="248" y="229" font-size="10" fill="#2B6CB0">• "What happens if I click</text>
  <text x="248" y="244" font-size="10" fill="#2B6CB0">  this?" (unclear affordances)</text>
  <rect x="248" y="257" width="172" height="36" rx="6" fill="#BEE3F8" stroke="#4299E1" stroke-width="1"/>
  <text x="334" y="272" text-anchor="middle" font-size="9" fill="#1A365D" font-style="italic">Fix: Add labels, tooltips, help</text>
  <text x="334" y="286" text-anchor="middle" font-size="9" fill="#1A365D" font-style="italic">text, or confirmation states.</text>

  <!-- Lens 3: What would make users abandon? -->
  <rect x="456" y="66" width="204" height="240" rx="10" fill="#FFF5F7" stroke="#FC8181" stroke-width="2"/>
  <rect x="456" y="66" width="204" height="44" rx="10" fill="#FC8181"/>
  <rect x="456" y="92" width="204" height="18" fill="#FC8181"/>
  <text x="558" y="89" text-anchor="middle" font-size="22">🚪</text>
  <text x="558" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#63171B">What would make</text>
  <text x="558" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="#63171B">users abandon?</text>
  <text x="466" y="148" font-size="10" fill="#9B2335" font-weight="bold">Look for:</text>
  <text x="466" y="165" font-size="10" fill="#C53030">• Unexpected costs or friction</text>
  <text x="466" y="181" font-size="10" fill="#C53030">  mid-flow (nasty surprise)</text>
  <text x="466" y="197" font-size="10" fill="#C53030">• Mandatory sign-up before</text>
  <text x="466" y="213" font-size="10" fill="#C53030">  showing value</text>
  <text x="466" y="229" font-size="10" fill="#C53030">• Error messages that don't</text>
  <text x="466" y="244" font-size="10" fill="#C53030">  explain how to recover</text>
  <rect x="466" y="257" width="172" height="36" rx="6" fill="#FED7D7" stroke="#E53E3E" stroke-width="1"/>
  <text x="552" y="272" text-anchor="middle" font-size="9" fill="#63171B" font-style="italic">Fix: Reduce commitment early;</text>
  <text x="552" y="286" text-anchor="middle" font-size="9" fill="#63171B" font-style="italic">always provide a recovery path.</text>

  <!-- Footer -->
  <text x="340" y="328" text-anchor="middle" font-size="10" fill="#A0AEC0">Annotate flow diagrams with these questions — each answer is a design decision</text>

  <!-- Connecting bracket / note at bottom -->
  <text x="340" y="315" text-anchor="middle" font-size="10" fill="#718096">Use mermaid flowcharts to map flows; annotate branches with the questions above</text>
</svg>
