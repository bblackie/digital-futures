<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#e6f3ff"/>
  <rect x="50" y="150" width="200" height="100" rx="10" fill="#4dabf7" stroke="#333" stroke-width="2"/>
  <text x="150" y="200" font-family="Arial" font-size="24" text-anchor="middle" fill="white">Input</text>
  
  <rect x="300" y="150" width="200" height="100" rx="10" fill="#ffd43b" stroke="#333" stroke-width="2"/>
  <text x="400" y="200" font-family="Arial" font-size="24" text-anchor="middle" fill="#333">Process</text>
  
  <rect x="550" y="150" width="200" height="100" rx="10" fill="#69db7c" stroke="#333" stroke-width="2"/>
  <text x="650" y="200" font-family="Arial" font-size="24" text-anchor="middle" fill="white">Output</text>
  
  <line x1="250" y1="200" x2="300" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="200" x2="550" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>