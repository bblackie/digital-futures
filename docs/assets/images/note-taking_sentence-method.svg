<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f3f0ff" rx="16"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#5f3dc4">The Sentence Method</text>
  <!-- Numbered lines -->
  <rect x="120" y="60" width="560" height="220" rx="8" fill="#fff" stroke="#5f3dc4" stroke-width="1.5"/>
  <!-- Line 1 -->
  <circle cx="160" cy="95" r="14" fill="#7950f2" opacity="0.15"/>
  <text x="160" y="100" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" fill="#5f3dc4">1</text>
  <text x="190" y="100" font-family="Arial, sans-serif" font-size="14" fill="#495057">Programs follow instructions exactly as written.</text>
  <!-- Line 2 -->
  <circle cx="160" cy="130" r="14" fill="#7950f2" opacity="0.15"/>
  <text x="160" y="135" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" fill="#5f3dc4">2</text>
  <text x="190" y="135" font-family="Arial, sans-serif" font-size="14" fill="#495057">Variables store data that can change.</text>
  <!-- Line 3 -->
  <circle cx="160" cy="165" r="14" fill="#7950f2" opacity="0.15"/>
  <text x="160" y="170" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" fill="#5f3dc4">3</text>
  <text x="190" y="170" font-family="Arial, sans-serif" font-size="14" fill="#495057">Decisions use if/else to choose a path.</text>
  <!-- Gap -->
  <line x1="150" y1="195" x2="650" y2="195" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Line 4 -->
  <circle cx="160" cy="220" r="14" fill="#7950f2" opacity="0.15"/>
  <text x="160" y="225" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" fill="#5f3dc4">4</text>
  <text x="190" y="225" font-family="Arial, sans-serif" font-size="14" fill="#495057">Loops repeat actions until a condition is met.</text>
  <!-- Line 5 -->
  <circle cx="160" cy="255" r="14" fill="#7950f2" opacity="0.15"/>
  <text x="160" y="260" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" fill="#5f3dc4">5</text>
  <text x="190" y="260" font-family="Arial, sans-serif" font-size="14" fill="#495057">Testing finds errors before submission.</text>
</svg>