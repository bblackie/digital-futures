<svg width="740" height="450" viewBox="0 0 740 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="740" height="450" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="738" height="448" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <!-- Title -->
  <text x="370" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A202C">Unit Topics → Assessment Requirements</text>
  <text x="370" y="50" text-anchor="middle" font-size="11" fill="#718096">How the 7 unit topics build your AS91901 submission evidence</text>

  <!-- Column headers -->
  <text x="160" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D3748">Unit Topics</text>
  <text x="580" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D3748">Assessment Requirements</text>

  <!-- Divider line -->
  <line x1="20" y1="80" x2="720" y2="80" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- TOPICS (left column) - 7 items -->
  <!-- Topic 1 -->
  <rect x="20" y="92" width="285" height="36" rx="7" fill="#E6FFFA" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="30" y="107" font-size="11" font-weight="bold" fill="#285E61">T1</text>
  <text x="50" y="107" font-size="11" fill="#285E61">User Research &amp; Personas</text>
  <text x="30" y="121" font-size="9" fill="#4A5568">Who am I designing for?</text>

  <!-- Topic 2 -->
  <rect x="20" y="136" width="285" height="36" rx="7" fill="#EBF8FF" stroke="#63B3ED" stroke-width="1.5"/>
  <text x="30" y="151" font-size="11" font-weight="bold" fill="#2C5282">T2</text>
  <text x="50" y="151" font-size="11" fill="#2C5282">Info Architecture &amp; Wireframing</text>
  <text x="30" y="165" font-size="9" fill="#4A5568">Structure and layout sketches</text>

  <!-- Topic 3 -->
  <rect x="20" y="180" width="285" height="36" rx="7" fill="#FFF5F7" stroke="#FC8181" stroke-width="1.5"/>
  <text x="30" y="195" font-size="11" font-weight="bold" fill="#9B2335">T3</text>
  <text x="50" y="195" font-size="11" fill="#9B2335">Visual Design Principles</text>
  <text x="30" y="209" font-size="9" fill="#4A5568">Colour, typography, visual hierarchy</text>

  <!-- Topic 4 -->
  <rect x="20" y="224" width="285" height="36" rx="7" fill="#FFFFF0" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="30" y="239" font-size="11" font-weight="bold" fill="#285E61">T4</text>
  <text x="50" y="239" font-size="11" fill="#285E61">Accessibility &amp; WCAG</text>
  <text x="30" y="253" font-size="9" fill="#4A5568">Designing for everyone</text>

  <!-- Topic 5 -->
  <rect x="20" y="268" width="285" height="36" rx="7" fill="#FAF5FF" stroke="#B794F4" stroke-width="1.5"/>
  <text x="30" y="283" font-size="11" font-weight="bold" fill="#553C9A">T5</text>
  <text x="50" y="283" font-size="11" fill="#553C9A">Prototyping &amp; Tools</text>
  <text x="30" y="297" font-size="9" fill="#4A5568">Digital mockups and interaction</text>

  <!-- Topic 6 -->
  <rect x="20" y="312" width="285" height="36" rx="7" fill="#FFFBEB" stroke="#F6AD55" stroke-width="1.5"/>
  <text x="30" y="327" font-size="11" font-weight="bold" fill="#744210">T6</text>
  <text x="50" y="327" font-size="11" fill="#744210">User Testing &amp; Usability Eval.</text>
  <text x="30" y="341" font-size="9" fill="#4A5568">Testing with real users</text>

  <!-- Topic 7 -->
  <rect x="20" y="356" width="285" height="36" rx="7" fill="#FFF5F7" stroke="#F687B3" stroke-width="1.5"/>
  <text x="30" y="371" font-size="11" font-weight="bold" fill="#702459">T7</text>
  <text x="50" y="371" font-size="11" fill="#702459">Design Iteration &amp; Feedback</text>
  <text x="30" y="385" font-size="9" fill="#4A5568">Improve based on evidence</text>

  <!-- REQUIREMENTS (right column) - 6 items -->
  <!-- Req 1 -->
  <rect x="435" y="96" width="285" height="36" rx="7" fill="#E6FFFA" stroke="#38A169" stroke-width="1.5"/>
  <text x="445" y="111" font-size="10" font-weight="bold" fill="#1C4532">R1</text>
  <text x="462" y="111" font-size="10" fill="#276749">Wireframes (≥ 2 iterations)</text>
  <text x="445" y="125" font-size="9" fill="#4A5568">Design evolution documented</text>

  <!-- Req 2 -->
  <rect x="435" y="157" width="285" height="36" rx="7" fill="#FFF5F7" stroke="#FC8181" stroke-width="1.5"/>
  <text x="445" y="172" font-size="10" font-weight="bold" fill="#9B2335">R2</text>
  <text x="462" y="172" font-size="10" fill="#C53030">High-fidelity prototype</text>
  <text x="445" y="186" font-size="9" fill="#4A5568">Visual design, layout, interaction</text>

  <!-- Req 3 -->
  <rect x="435" y="218" width="285" height="36" rx="7" fill="#FFFBEB" stroke="#D69E2E" stroke-width="1.5"/>
  <text x="445" y="233" font-size="10" font-weight="bold" fill="#744210">R3</text>
  <text x="462" y="233" font-size="10" fill="#B45309">User testing evidence (≥ 3 users)</text>
  <text x="445" y="247" font-size="9" fill="#4A5568">Real user sessions documented</text>

  <!-- Req 4 -->
  <rect x="435" y="279" width="285" height="36" rx="7" fill="#FFF5F7" stroke="#F687B3" stroke-width="1.5"/>
  <text x="445" y="294" font-size="10" font-weight="bold" fill="#702459">R4</text>
  <text x="462" y="294" font-size="10" fill="#702459">Design iteration journal</text>
  <text x="445" y="308" font-size="9" fill="#4A5568">Changes in response to feedback</text>

  <!-- Req 5 -->
  <rect x="435" y="340" width="285" height="36" rx="7" fill="#FFFFF0" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="445" y="355" font-size="10" font-weight="bold" fill="#285E61">R5</text>
  <text x="462" y="355" font-size="10" fill="#2C7A7B">Accessibility checklist (WCAG 2.1 AA)</text>
  <text x="445" y="369" font-size="9" fill="#4A5568">Verified compliance</text>

  <!-- Req 6 -->
  <rect x="435" y="396" width="285" height="36" rx="7" fill="#EBF8FF" stroke="#63B3ED" stroke-width="1.5"/>
  <text x="445" y="411" font-size="10" font-weight="bold" fill="#2C5282">R6</text>
  <text x="462" y="411" font-size="10" fill="#2B6CB0">Design walkthrough critique</text>
  <text x="445" y="425" font-size="9" fill="#4A5568">Explain decisions and rationale</text>

  <!-- Connection lines (T → R) -->
  <!-- T1 → R1 (research feeds wireframes) -->
  <line x1="305" y1="110" x2="435" y2="114" stroke="#4FD1C5" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>
  <!-- T2 → R1 (IA feeds wireframes) -->
  <line x1="305" y1="154" x2="435" y2="114" stroke="#63B3ED" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>
  <!-- T3 → R2 (visual design → hi-fi) -->
  <line x1="305" y1="198" x2="435" y2="175" stroke="#FC8181" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>
  <!-- T4 → R5 (accessibility → checklist) -->
  <line x1="305" y1="242" x2="435" y2="358" stroke="#4FD1C5" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>
  <!-- T5 → R2 (prototyping → hi-fi) -->
  <line x1="305" y1="286" x2="435" y2="175" stroke="#B794F4" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>
  <!-- T6 → R3 (user testing → evidence) -->
  <line x1="305" y1="330" x2="435" y2="236" stroke="#F6AD55" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>
  <!-- T7 → R4 (iteration → journal) -->
  <line x1="305" y1="374" x2="435" y2="297" stroke="#F687B3" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>
  <!-- T6 → R6 (critique evidence comes from testing) -->
  <line x1="305" y1="330" x2="435" y2="414" stroke="#F6AD55" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
  <!-- T7 → R6 (iteration rationale for critique) -->
  <line x1="305" y1="374" x2="435" y2="414" stroke="#F687B3" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>

  <!-- Footer -->
  <text x="370" y="444" text-anchor="middle" font-size="10" fill="#A0AEC0">AS91901 — All 7 topics contribute to your submission; dashed lines show primary links</text>
</svg>
