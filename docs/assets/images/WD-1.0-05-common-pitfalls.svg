<svg width="720" height="490" viewBox="0 0 720 490" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="720" height="490" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="718" height="488" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A202C">⚠  Six Common Pitfalls to Avoid</text>
  <text x="360" y="52" text-anchor="middle" font-size="11" fill="#718096">Recognise these early — they are the most common reasons students lose marks</text>

  <!-- Pitfall 1: Designing for yourself -->
  <rect x="18" y="68" width="330" height="122" rx="10" fill="#FFFBF0" stroke="#ED8936" stroke-width="2"/>
  <rect x="18" y="68" width="330" height="32" rx="10" fill="#ED8936"/>
  <rect x="18" y="86" width="330" height="14" fill="#ED8936"/>
  <text x="33" y="89" font-size="12" font-weight="bold" fill="#7B341E">✗ 1</text>
  <text x="60" y="89" font-size="12" font-weight="bold" fill="#7B341E">Designing for yourself</text>
  <text x="28" y="116" font-size="10" fill="#7B341E">Just because <tspan font-style="italic">you</tspan> like it doesn't mean users can navigate it.</text>
  <text x="28" y="132" font-size="10" fill="#7B341E">Design preferences don't equal usability.</text>
  <text x="28" y="155" font-size="10" fill="#9C4221" font-weight="bold">Fix: Test your design with real people who don't know it.</text>
  <text x="28" y="179" font-size="9" fill="#C05621" font-style="italic">Evidence needed: User testing notes from 3+ people outside class.</text>

  <!-- Pitfall 2: Skipping wireframes -->
  <rect x="372" y="68" width="330" height="122" rx="10" fill="#FFFBF0" stroke="#DD6B20" stroke-width="2"/>
  <rect x="372" y="68" width="330" height="32" rx="10" fill="#DD6B20"/>
  <rect x="372" y="86" width="330" height="14" fill="#DD6B20"/>
  <text x="387" y="89" font-size="12" font-weight="bold" fill="#7B341E">✗ 2</text>
  <text x="414" y="89" font-size="12" font-weight="bold" fill="#7B341E">Skipping wireframes</text>
  <text x="382" y="116" font-size="10" fill="#7B341E">Jumping to hi-fi design wastes time when structure is wrong.</text>
  <text x="382" y="132" font-size="10" fill="#7B341E">Visual polish can't fix a broken layout.</text>
  <text x="382" y="155" font-size="10" fill="#9C4221" font-weight="bold">Fix: Always wireframe first — they're fast and reveal structural problems.</text>
  <text x="382" y="179" font-size="9" fill="#C05621" font-style="italic">Evidence needed: At least 2 wireframe iterations on record.</text>

  <!-- Pitfall 3: Ignoring accessibility -->
  <rect x="18" y="206" width="330" height="122" rx="10" fill="#F0FFFE" stroke="#319795" stroke-width="2"/>
  <rect x="18" y="206" width="330" height="32" rx="10" fill="#319795"/>
  <rect x="18" y="224" width="330" height="14" fill="#319795"/>
  <text x="33" y="227" font-size="12" font-weight="bold" fill="#1D4044">✗ 3</text>
  <text x="60" y="227" font-size="12" font-weight="bold" fill="#1D4044">Ignoring accessibility</text>
  <text x="28" y="254" font-size="10" fill="#1D4044">WCAG compliance is not optional — it's a minimum threshold.</text>
  <text x="28" y="270" font-size="10" fill="#1D4044">Leaving it until the end usually means starting over.</text>
  <text x="28" y="293" font-size="10" fill="#285E61" font-weight="bold">Fix: Check contrast ratios and keyboard nav from your first prototype.</text>
  <text x="28" y="317" font-size="9" fill="#2C7A7B" font-style="italic">Evidence needed: Completed WCAG 2.1 AA accessibility checklist.</text>

  <!-- Pitfall 4: Testing only classmates -->
  <rect x="372" y="206" width="330" height="122" rx="10" fill="#FFF5F7" stroke="#D53F8C" stroke-width="2"/>
  <rect x="372" y="206" width="330" height="32" rx="10" fill="#D53F8C"/>
  <rect x="372" y="224" width="330" height="14" fill="#D53F8C"/>
  <text x="387" y="227" font-size="12" font-weight="bold" fill="#702459">✗ 4</text>
  <text x="414" y="227" font-size="12" font-weight="bold" fill="#702459">Testing only classmates</text>
  <text x="382" y="254" font-size="10" fill="#702459">Classmates know your design intent — they are biased testers.</text>
  <text x="382" y="270" font-size="10" fill="#702459">Familiar users overlook problems real users will hit.</text>
  <text x="382" y="293" font-size="10" fill="#97266D" font-weight="bold">Fix: Recruit testers who are unfamiliar with your project.</text>
  <text x="382" y="317" font-size="9" fill="#B83280" font-style="italic">Evidence needed: Testing notes showing unfamiliar participants.</text>

  <!-- Pitfall 5: One-off iteration -->
  <rect x="18" y="344" width="330" height="122" rx="10" fill="#FAF5FF" stroke="#805AD5" stroke-width="2"/>
  <rect x="18" y="344" width="330" height="32" rx="10" fill="#805AD5"/>
  <rect x="18" y="362" width="330" height="14" fill="#805AD5"/>
  <text x="33" y="365" font-size="12" font-weight="bold" fill="#44337A">✗ 5</text>
  <text x="60" y="365" font-size="12" font-weight="bold" fill="#44337A">One-off "iteration"</text>
  <text x="28" y="392" font-size="10" fill="#44337A">Feedback is not a checklist item — iteration is a cycle.</text>
  <text x="28" y="408" font-size="10" fill="#44337A">Changing one element can break another; verify everything.</text>
  <text x="28" y="431" font-size="10" fill="#553C9A" font-weight="bold">Fix: Treat each round of changes as a new test cycle.</text>
  <text x="28" y="455" font-size="9" fill="#6B46C1" font-style="italic">Evidence needed: Journal showing multiple rounds of change + verification.</text>

  <!-- Pitfall 6: No documentation -->
  <rect x="372" y="344" width="330" height="122" rx="10" fill="#FFF5F7" stroke="#E53E3E" stroke-width="2"/>
  <rect x="372" y="344" width="330" height="32" rx="10" fill="#E53E3E"/>
  <rect x="372" y="362" width="330" height="14" fill="#E53E3E"/>
  <text x="387" y="365" font-size="12" font-weight="bold" fill="#63171B">✗ 6</text>
  <text x="414" y="365" font-size="12" font-weight="bold" fill="#63171B">No documentation</text>
  <text x="382" y="392" font-size="10" fill="#63171B">Your teacher can't credit thinking you didn't record.</text>
  <text x="382" y="408" font-size="10" fill="#63171B">"I did it but didn't write it down" is not valid evidence.</text>
  <text x="382" y="431" font-size="10" fill="#9B2335" font-weight="bold">Fix: Keep an iteration journal from day one of the project.</text>
  <text x="382" y="455" font-size="9" fill="#C53030" font-style="italic">Evidence needed: Ongoing journal entries throughout all 4 weeks.</text>

  <!-- Footer -->
  <text x="360" y="482" text-anchor="middle" font-size="10" fill="#A0AEC0">AS91901 — All six pitfalls are recoverable early; they are very costly late in the assessment</text>
</svg>
