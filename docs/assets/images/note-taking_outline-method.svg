<svg width="800" height="320" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fff4e6" rx="16"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#d9480f">The Outline Method</text>
  <!-- Outline representation -->
  <rect x="120" y="60" width="560" height="240" rx="8" fill="#fff" stroke="#d9480f" stroke-width="1.5"/>
  <!-- Main heading -->
  <circle cx="160" cy="95" r="6" fill="#d9480f"/>
  <text x="180" y="100" font-family="monospace" font-size="16" font-weight="bold" fill="#d9480f">Main Heading</text>
  <!-- Sub-point 1 -->
  <circle cx="200" cy="130" r="5" fill="#fd7e14" opacity="0.8"/>
  <text x="220" y="135" font-family="monospace" font-size="14" fill="#495057">Sub-point (indent once)</text>
  <!-- Detail under sub-point 1 -->
  <circle cx="240" cy="160" r="4" fill="#ffa94d" opacity="0.7"/>
  <text x="260" y="165" font-family="monospace" font-size="13" fill="#868e96">Detail — example or fact (indent twice)</text>
  <circle cx="240" cy="185" r="4" fill="#ffa94d" opacity="0.7"/>
  <text x="260" y="190" font-family="monospace" font-size="13" fill="#868e96">Detail — definition (indent twice)</text>
  <!-- Sub-point 2 -->
  <circle cx="200" cy="220" r="5" fill="#fd7e14" opacity="0.8"/>
  <text x="220" y="225" font-family="monospace" font-size="14" fill="#495057">Sub-point (indent once)</text>
  <!-- Detail under sub-point 2 -->
  <circle cx="240" cy="250" r="4" fill="#ffa94d" opacity="0.7"/>
  <text x="260" y="255" font-family="monospace" font-size="13" fill="#868e96">Detail — example (indent twice)</text>
  <!-- Indent guide lines -->
  <line x1="155" y1="105" x2="155" y2="230" stroke="#d9480f" stroke-width="1" opacity="0.3"/>
  <line x1="195" y1="140" x2="195" y2="190" stroke="#fd7e14" stroke-width="1" opacity="0.3"/>
  <line x1="195" y1="230" x2="195" y2="255" stroke="#fd7e14" stroke-width="1" opacity="0.3"/>
</svg>