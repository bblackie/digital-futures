<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="600" height="400" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="598" height="398" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A202C">The UX Design Process</text>
  <text x="300" y="56" text-anchor="middle" font-size="12" fill="#718096">An iterative cycle — not a one-time task</text>

  <!-- Dashed orbit ring -->
  <circle cx="300" cy="225" r="110" fill="none" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Central label -->
  <circle cx="300" cy="225" r="46" fill="#EBF8FF" stroke="#4299E1" stroke-width="2"/>
  <text x="300" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B6CB0">User</text>
  <text x="300" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B6CB0">Centred</text>

  <!-- ① Research (top-left) -->
  <circle cx="175" cy="130" r="38" fill="#C6F6D5" stroke="#38A169" stroke-width="2"/>
  <text x="175" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#1C4532">Research</text>
  <text x="175" y="141" text-anchor="middle" font-size="10" fill="#276749">Users</text>

  <!-- ② Design (top-right) -->
  <circle cx="425" cy="130" r="38" fill="#BEE3F8" stroke="#3182CE" stroke-width="2"/>
  <text x="425" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A365D">Design</text>
  <text x="425" y="141" text-anchor="middle" font-size="10" fill="#2C5282">Solutions</text>

  <!-- ③ Prototype (right) -->
  <circle cx="490" cy="255" r="38" fill="#FED7E2" stroke="#D53F8C" stroke-width="2"/>
  <text x="490" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#702459">Prototype</text>
  <text x="490" y="266" text-anchor="middle" font-size="10" fill="#702459">&amp; Build</text>

  <!-- ④ Test (bottom-right) -->
  <circle cx="390" cy="340" r="38" fill="#FEFCBF" stroke="#D69E2E" stroke-width="2"/>
  <text x="390" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#744210">Test with</text>
  <text x="390" y="351" text-anchor="middle" font-size="10" fill="#744210">Real Users</text>

  <!-- ⑤ Iterate (bottom-left) -->
  <circle cx="185" cy="330" r="38" fill="#E9D8FD" stroke="#805AD5" stroke-width="2"/>
  <text x="185" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#44337A">Iterate</text>
  <text x="185" y="341" text-anchor="middle" font-size="10" fill="#553C9A">&amp; Refine</text>

  <!-- Arrows connecting nodes clockwise -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#718096"/>
    </marker>
  </defs>

  <!-- Research → Design -->
  <path d="M 213 118 Q 300 88 387 118" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Design → Prototype -->
  <path d="M 452 162 Q 475 205 481 228" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Prototype → Test -->
  <path d="M 468 284 Q 448 312 425 325" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Test → Iterate -->
  <path d="M 352 349 Q 300 367 224 348" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Iterate → Research -->
  <path d="M 158 295 Q 145 210 155 165" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Step numbers on arrows -->
  <circle cx="300" cy="86" r="9" fill="#4299E1"/>
  <text x="300" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="white">1</text>

  <circle cx="482" cy="195" r="9" fill="#D53F8C"/>
  <text x="482" y="199" text-anchor="middle" font-size="10" font-weight="bold" fill="white">2</text>

  <circle cx="452" cy="310" r="9" fill="#D69E2E"/>
  <text x="452" y="314" text-anchor="middle" font-size="10" font-weight="bold" fill="white">3</text>

  <circle cx="284" cy="370" r="9" fill="#805AD5"/>
  <text x="284" y="374" text-anchor="middle" font-size="10" font-weight="bold" fill="white">4</text>

  <circle cx="140" cy="228" r="9" fill="#38A169"/>
  <text x="140" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="white">5</text>

  <!-- Footer note -->
  <text x="300" y="392" text-anchor="middle" font-size="10" fill="#A0AEC0">Level 3 UX Methodology — AS91901</text>
</svg>
