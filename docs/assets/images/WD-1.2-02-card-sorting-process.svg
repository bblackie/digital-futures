<svg width="740" height="280" viewBox="0 0 740 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="740" height="280" fill="#F7FAFC" rx="14"/>
  <rect x="1" y="1" width="738" height="278" fill="none" stroke="#E2E8F0" stroke-width="2" rx="14"/>

  <!-- Title -->
  <text x="370" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A202C">Card Sorting: 5-Step Process</text>
  <text x="370" y="50" text-anchor="middle" font-size="11" fill="#718096">Discover how users mentally organize content — before you impose your own structure</text>

  <!-- Arrow track -->
  <defs>
    <marker id="arr2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#A0AEC0"/>
    </marker>
  </defs>
  <line x1="115" y1="165" x2="145" y2="165" stroke="#A0AEC0" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="255" y1="165" x2="285" y2="165" stroke="#A0AEC0" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="395" y1="165" x2="425" y2="165" stroke="#A0AEC0" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="535" y1="165" x2="565" y2="165" stroke="#A0AEC0" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 1 -->
  <rect x="20" y="72" width="120" height="152" rx="10" fill="#EBF8FF" stroke="#63B3ED" stroke-width="2"/>
  <circle cx="80" cy="98" r="16" fill="#4299E1"/>
  <text x="80" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1</text>
  <text x="80" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C5282">Prepare</text>
  <text x="80" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C5282">Cards</text>
  <text x="80" y="171" text-anchor="middle" font-size="9" fill="#4A5568">Write each content</text>
  <text x="80" y="184" text-anchor="middle" font-size="9" fill="#4A5568">label on an index</text>
  <text x="80" y="197" text-anchor="middle" font-size="9" fill="#4A5568">card (e.g. "Pricing",</text>
  <text x="80" y="210" text-anchor="middle" font-size="9" fill="#4A5568">"FAQ", "Contact")</text>

  <!-- Step 2 -->
  <rect x="160" y="72" width="120" height="152" rx="10" fill="#F0FFF4" stroke="#68D391" stroke-width="2"/>
  <circle cx="220" cy="98" r="16" fill="#38A169"/>
  <text x="220" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="white">2</text>
  <text x="220" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#276749">Ask Users</text>
  <text x="220" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#276749">to Group</text>
  <text x="220" y="171" text-anchor="middle" font-size="9" fill="#4A5568">Give cards to users;</text>
  <text x="220" y="184" text-anchor="middle" font-size="9" fill="#4A5568">ask them to sort into</text>
  <text x="220" y="197" text-anchor="middle" font-size="9" fill="#4A5568">logical categories</text>
  <text x="220" y="210" text-anchor="middle" font-size="9" fill="#4A5568">(no right answer)</text>

  <!-- Step 3 -->
  <rect x="300" y="72" width="120" height="152" rx="10" fill="#FFFBEB" stroke="#F6AD55" stroke-width="2"/>
  <circle cx="360" cy="98" r="16" fill="#D69E2E"/>
  <text x="360" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="white">3</text>
  <text x="360" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#744210">Observe</text>
  <text x="360" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#744210">and Ask Why</text>
  <text x="360" y="171" text-anchor="middle" font-size="9" fill="#4A5568">Watch quietly; after</text>
  <text x="360" y="184" text-anchor="middle" font-size="9" fill="#4A5568">sorting, ask "Why did</text>
  <text x="360" y="197" text-anchor="middle" font-size="9" fill="#4A5568">you group these</text>
  <text x="360" y="210" text-anchor="middle" font-size="9" fill="#4A5568">together?"</text>

  <!-- Step 4 -->
  <rect x="440" y="72" width="120" height="152" rx="10" fill="#FAF5FF" stroke="#B794F4" stroke-width="2"/>
  <circle cx="500" cy="98" r="16" fill="#805AD5"/>
  <text x="500" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="white">4</text>
  <text x="500" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#553C9A">Find</text>
  <text x="500" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#553C9A">Patterns</text>
  <text x="500" y="171" text-anchor="middle" font-size="9" fill="#4A5568">Across sessions:</text>
  <text x="500" y="184" text-anchor="middle" font-size="9" fill="#4A5568">what do most users</text>
  <text x="500" y="197" text-anchor="middle" font-size="9" fill="#4A5568">group together? Do</text>
  <text x="500" y="210" text-anchor="middle" font-size="9" fill="#4A5568">patterns emerge?</text>

  <!-- Step 5 -->
  <rect x="580" y="72" width="140" height="152" rx="10" fill="#FFF5F7" stroke="#FC8181" stroke-width="2"/>
  <circle cx="650" cy="98" r="16" fill="#E53E3E"/>
  <text x="650" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="white">5</text>
  <text x="650" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#9B2335">Inform</text>
  <text x="650" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#9B2335">Navigation</text>
  <text x="650" y="171" text-anchor="middle" font-size="9" fill="#4A5568">Use the majority</text>
  <text x="650" y="184" text-anchor="middle" font-size="9" fill="#4A5568">grouping patterns to</text>
  <text x="650" y="197" text-anchor="middle" font-size="9" fill="#4A5568">define your site's IA</text>
  <text x="650" y="210" text-anchor="middle" font-size="9" fill="#4A5568">and nav labels.</text>

  <!-- Key insight box -->
  <rect x="20" y="240" width="700" height="28" rx="7" fill="#E6FFFA" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="370" y="258" text-anchor="middle" font-size="10" fill="#285E61">💡  Key insight: Different users have different mental models — research reveals mismatches before you code them in</text>

  <!-- Footer -->
  <text x="370" y="273" text-anchor="middle" font-size="9" fill="#A0AEC0">Card sorting is a 15–30 minute exercise; even 5 participants reveal major structural patterns</text>
</svg>
