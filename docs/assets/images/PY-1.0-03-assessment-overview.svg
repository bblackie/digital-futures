<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 370" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="760" height="370" rx="14" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A202C">AS91896 Assessment — What You Must Submit</text>

  <!-- LEFT PANEL: 5 Evidence Items -->
  <text x="190" y="52" text-anchor="middle" font-size="11" font-weight="bold" fill="#2D3748">Required Evidence (all 5 needed)</text>

  <!-- Item 1: Source Code -->
  <rect x="20" y="62" width="340" height="46" rx="8" fill="#EBF8FF" stroke="#90CDF4" stroke-width="1.3"/>
  <rect x="20" y="62" width="8" height="46" rx="4" fill="#3182CE"/>
  <text x="40" y="80" font-size="10.5" font-weight="bold" fill="#2C5282">① Source Code</text>
  <text x="40" y="97" font-size="9.5" fill="#2B6CB0">Python file with clear variable names, comments, and logical structure.</text>

  <!-- Item 2: Test Evidence -->
  <rect x="20" y="115" width="340" height="46" rx="8" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="1.3"/>
  <rect x="20" y="115" width="8" height="46" rx="4" fill="#38A169"/>
  <text x="40" y="133" font-size="10.5" font-weight="bold" fill="#22543D">② Test Evidence</text>
  <text x="40" y="150" font-size="9.5" fill="#2F855A">At least 3 test cases per major function — normal, boundary, and edge inputs.</text>

  <!-- Item 3: Debugging Evidence -->
  <rect x="20" y="168" width="340" height="46" rx="8" fill="#FFF5F5" stroke="#FEB2B2" stroke-width="1.3"/>
  <rect x="20" y="168" width="8" height="46" rx="4" fill="#E53E3E"/>
  <text x="40" y="186" font-size="10.5" font-weight="bold" fill="#742A2A">③ Debugging Evidence</text>
  <text x="40" y="203" font-size="9.5" fill="#C53030">Comments showing errors found, root cause identified, fix applied, and re-tested.</text>

  <!-- Item 4: Design Documentation -->
  <rect x="20" y="221" width="340" height="46" rx="8" fill="#FAF5FF" stroke="#D6BCFA" stroke-width="1.3"/>
  <rect x="20" y="221" width="8" height="46" rx="4" fill="#805AD5"/>
  <text x="40" y="239" font-size="10.5" font-weight="bold" fill="#44337A">④ Design Documentation</text>
  <text x="40" y="256" font-size="9.5" fill="#6B46C1">Pseudocode or flowchart written before coding — must show pre-code planning.</text>

  <!-- Item 5: Reflection -->
  <rect x="20" y="274" width="340" height="46" rx="8" fill="#FFFFF0" stroke="#FAF089" stroke-width="1.3"/>
  <rect x="20" y="274" width="8" height="46" rx="4" fill="#D69E2E"/>
  <text x="40" y="292" font-size="10.5" font-weight="bold" fill="#744210">⑤ Reflection</text>
  <text x="40" y="309" font-size="9.5" fill="#975A16">What worked, what was difficult, what you would improve next time.</text>

  <!-- Missing evidence warning -->
  <rect x="20" y="330" width="340" height="26" rx="6" fill="#FFF5F5" stroke="#FC8181" stroke-width="1"/>
  <text x="190" y="347" text-anchor="middle" font-size="9" fill="#C53030">⚠ Missing evidence items are the most common reason for not achieving.</text>

  <!-- Vertical Divider -->
  <line x1="384" y1="45" x2="384" y2="360" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- RIGHT PANEL: Grade Ladder -->
  <text x="572" y="52" text-anchor="middle" font-size="11" font-weight="bold" fill="#2D3748">Grade Expectations</text>

  <!-- Excellence bar -->
  <rect x="400" y="62" width="340" height="76" rx="10" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="1.5"/>
  <rect x="400" y="62" width="76" height="76" rx="10" fill="#276749"/>
  <rect x="450" y="62" width="26" height="76" fill="#276749"/>
  <text x="438" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">E</text>
  <text x="438" y="113" text-anchor="middle" font-size="9" fill="#C6F6D5">Excellence</text>
  <text x="558" y="83" text-anchor="middle" font-size="9.5" fill="#22543D">Well-structured, efficient code</text>
  <text x="558" y="98" text-anchor="middle" font-size="9.5" fill="#22543D">Design decisions justified in docs</text>
  <text x="558" y="113" text-anchor="middle" font-size="9.5" fill="#22543D">Systematic testing, edge cases</text>
  <text x="558" y="128" text-anchor="middle" font-size="9.5" fill="#22543D">Insightful, self-aware reflection</text>

  <!-- Merit bar -->
  <rect x="400" y="153" width="340" height="76" rx="10" fill="#EBF8FF" stroke="#90CDF4" stroke-width="1.5"/>
  <rect x="400" y="153" width="76" height="76" rx="10" fill="#2C5282"/>
  <rect x="450" y="153" width="26" height="76" fill="#2C5282"/>
  <text x="438" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">M</text>
  <text x="438" y="204" text-anchor="middle" font-size="9" fill="#BEE3F8">Merit</text>
  <text x="558" y="174" text-anchor="middle" font-size="9.5" fill="#2B6CB0">Functional program solves the problem</text>
  <text x="558" y="189" text-anchor="middle" font-size="9.5" fill="#2B6CB0">Structures used with some justification</text>
  <text x="558" y="204" text-anchor="middle" font-size="9.5" fill="#2B6CB0">Testing and bug-fixing documented</text>
  <text x="558" y="219" text-anchor="middle" font-size="9.5" fill="#2B6CB0">Iterative development visible</text>

  <!-- Achieved bar -->
  <rect x="400" y="244" width="340" height="76" rx="10" fill="#FFFAF0" stroke="#FBD38D" stroke-width="1.5"/>
  <rect x="400" y="244" width="76" height="76" rx="10" fill="#C05621"/>
  <rect x="450" y="244" width="26" height="76" fill="#C05621"/>
  <text x="438" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">A</text>
  <text x="438" y="295" text-anchor="middle" font-size="9" fill="#FEEBC8">Achieved</text>
  <text x="558" y="265" text-anchor="middle" font-size="9.5" fill="#7B341E">Basic program partially addresses problem</text>
  <text x="558" y="280" text-anchor="middle" font-size="9.5" fill="#7B341E">Some control structures attempted</text>
  <text x="558" y="295" text-anchor="middle" font-size="9.5" fill="#7B341E">Minimal testing; limited documentation</text>
  <text x="558" y="310" text-anchor="middle" font-size="9.5" fill="#7B341E">Some teacher guidance may be evident</text>

  <!-- 4 credits badge -->
  <rect x="452" y="336" width="120" height="24" rx="6" fill="#2D3748"/>
  <text x="512" y="352" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#FFFFFF">NCEA Level 2 · 4 Credits · Internal</text>
</svg>
