<svg width="800" height="340" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f0ff" rx="16"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#7048e8">The Cornell Method</text>
  <!-- Page outline -->
  <rect x="100" y="60" width="600" height="260" rx="6" fill="#fff" stroke="#7048e8" stroke-width="2"/>
  <!-- Vertical divider -->
  <line x1="300" y1="60" x2="300" y2="260" stroke="#7048e8" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Horizontal divider -->
  <line x1="100" y1="260" x2="700" y2="260" stroke="#7048e8" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Cue column label -->
  <text x="200" y="90" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#7048e8">Cue Column</text>
  <text x="200" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#868e96">Keywords &amp;</text>
  <text x="200" y="132" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#868e96">Questions</text>
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#7048e8">❓</text>
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#868e96">Write AFTER</text>
  <text x="200" y="227" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#868e96">class</text>
  <!-- Notes column label -->
  <text x="500" y="90" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#7048e8">Notes Column</text>
  <line x1="330" y1="115" x2="670" y2="115" stroke="#e9ecef" stroke-width="1"/>
  <text x="340" y="132" font-family="Arial, sans-serif" font-size="12" fill="#495057">Key ideas, examples, explanations…</text>
  <line x1="330" y1="145" x2="670" y2="145" stroke="#e9ecef" stroke-width="1"/>
  <line x1="330" y1="165" x2="670" y2="165" stroke="#e9ecef" stroke-width="1"/>
  <line x1="330" y1="185" x2="670" y2="185" stroke="#e9ecef" stroke-width="1"/>
  <line x1="330" y1="205" x2="670" y2="205" stroke="#e9ecef" stroke-width="1"/>
  <line x1="330" y1="225" x2="670" y2="225" stroke="#e9ecef" stroke-width="1"/>
  <text x="500" y="250" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#868e96">Write DURING class</text>
  <!-- Summary strip -->
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#7048e8">Summary Strip</text>
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#868e96">1–2 sentence summary of the whole page</text>
</svg>