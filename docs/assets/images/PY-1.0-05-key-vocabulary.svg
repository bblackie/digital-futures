<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="760" height="420" rx="14" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A202C">Key Vocabulary — Programming with Python</text>

  <!-- ============================================================ -->
  <!-- CATEGORY 1: Data (top-left) — Blue -->
  <!-- ============================================================ -->
  <rect x="16" y="42" width="358" height="170" rx="10" fill="#EBF8FF" stroke="#90CDF4" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect x="16" y="42" width="358" height="30" rx="10" fill="#3182CE"/>
  <rect x="16" y="57" width="358" height="15" fill="#3182CE"/>
  <text x="195" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">Data</text>

  <!-- Col 1 -->
  <text x="30" y="92" font-size="10" fill="#1A202C"><tspan font-weight="bold">Variable</tspan> — a named storage location</text>
  <text x="30" y="108" font-size="10" fill="#1A202C"><tspan font-weight="bold">int</tspan> — whole number (e.g. 42)</text>
  <text x="30" y="124" font-size="10" fill="#1A202C"><tspan font-weight="bold">str</tspan> — text in quotes (e.g. "hello")</text>
  <text x="30" y="140" font-size="10" fill="#1A202C"><tspan font-weight="bold">float</tspan> — decimal number (e.g. 3.14)</text>
  <text x="30" y="156" font-size="10" fill="#1A202C"><tspan font-weight="bold">bool</tspan> — True or False only</text>
  <text x="30" y="172" font-size="10" fill="#1A202C"><tspan font-weight="bold">list</tspan> — ordered collection, mutable</text>
  <text x="30" y="188" font-size="10" fill="#1A202C"><tspan font-weight="bold">dict</tspan> — key-value pairs</text>
  <text x="30" y="204" font-size="10" fill="#1A202C"><tspan font-weight="bold">index</tspan> — position in a list (starts at 0)</text>

  <!-- ============================================================ -->
  <!-- CATEGORY 2: Control Flow (top-right) — Green -->
  <!-- ============================================================ -->
  <rect x="386" y="42" width="358" height="170" rx="10" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect x="386" y="42" width="358" height="30" rx="10" fill="#38A169"/>
  <rect x="386" y="57" width="358" height="15" fill="#38A169"/>
  <text x="565" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">Control Flow</text>

  <text x="400" y="92" font-size="10" fill="#1A202C"><tspan font-weight="bold">Conditional</tspan> — if/elif/else decision branch</text>
  <text x="400" y="108" font-size="10" fill="#1A202C"><tspan font-weight="bold">Loop</tspan> — repeats a block of code</text>
  <text x="400" y="124" font-size="10" fill="#1A202C"><tspan font-weight="bold">for</tspan> — iterates over a sequence</text>
  <text x="400" y="140" font-size="10" fill="#1A202C"><tspan font-weight="bold">while</tspan> — repeats while a condition is true</text>
  <text x="400" y="156" font-size="10" fill="#1A202C"><tspan font-weight="bold">Iteration</tspan> — one pass through a loop body</text>
  <text x="400" y="172" font-size="10" fill="#1A202C"><tspan font-weight="bold">break</tspan> — exits the loop immediately</text>
  <text x="400" y="188" font-size="10" fill="#1A202C"><tspan font-weight="bold">range()</tspan> — generates a sequence of numbers</text>

  <!-- ============================================================ -->
  <!-- CATEGORY 3: Functions &amp; Algorithms (bottom-left) — Purple -->
  <!-- ============================================================ -->
  <rect x="16" y="226" width="358" height="152" rx="10" fill="#FAF5FF" stroke="#D6BCFA" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect x="16" y="226" width="358" height="30" rx="10" fill="#805AD5"/>
  <rect x="16" y="241" width="358" height="15" fill="#805AD5"/>
  <text x="195" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">Functions &amp; Algorithms</text>

  <text x="30" y="276" font-size="10" fill="#1A202C"><tspan font-weight="bold">Function</tspan> — reusable named block (def keyword)</text>
  <text x="30" y="292" font-size="10" fill="#1A202C"><tspan font-weight="bold">Parameter</tspan> — variable defined in function signature</text>
  <text x="30" y="308" font-size="10" fill="#1A202C"><tspan font-weight="bold">Argument</tspan> — actual value passed when calling</text>
  <text x="30" y="324" font-size="10" fill="#1A202C"><tspan font-weight="bold">Return value</tspan> — output sent back to the caller</text>
  <text x="30" y="340" font-size="10" fill="#1A202C"><tspan font-weight="bold">Pseudocode</tspan> — plain-language program design</text>
  <text x="30" y="356" font-size="10" fill="#1A202C"><tspan font-weight="bold">Algorithm</tspan> — step-by-step solution to a problem</text>
  <text x="30" y="372" font-size="10" fill="#1A202C"><tspan font-weight="bold">Scope</tspan> — where a variable is accessible</text>

  <!-- ============================================================ -->
  <!-- CATEGORY 4: Testing &amp; Quality (bottom-right) — Red/Amber -->
  <!-- ============================================================ -->
  <rect x="386" y="226" width="358" height="152" rx="10" fill="#FFF5F5" stroke="#FEB2B2" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect x="386" y="226" width="358" height="30" rx="10" fill="#E53E3E"/>
  <rect x="386" y="241" width="358" height="15" fill="#E53E3E"/>
  <text x="565" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">Testing &amp; Quality</text>

  <text x="400" y="276" font-size="10" fill="#1A202C"><tspan font-weight="bold">Bug</tspan> — error that causes unexpected behaviour</text>
  <text x="400" y="292" font-size="10" fill="#1A202C"><tspan font-weight="bold">Debugging</tspan> — process of finding and fixing bugs</text>
  <text x="400" y="308" font-size="10" fill="#1A202C"><tspan font-weight="bold">Testing</tspan> — running code with known inputs to verify</text>
  <text x="400" y="324" font-size="10" fill="#1A202C"><tspan font-weight="bold">Edge case</tspan> — unusual/extreme valid input</text>
  <text x="400" y="340" font-size="10" fill="#1A202C"><tspan font-weight="bold">Boundary</tspan> — value at threshold (e.g. 0, -1, max)</text>
  <text x="400" y="356" font-size="10" fill="#1A202C"><tspan font-weight="bold">Documentation</tspan> — comments + README that explain code</text>
  <text x="400" y="372" font-size="10" fill="#1A202C"><tspan font-weight="bold">Syntax error</tspan> — code that Python cannot parse</text>

  <!-- Footer -->
  <rect x="16" y="390" width="728" height="20" rx="6" fill="#E2E8F0"/>
  <text x="380" y="404" text-anchor="middle" font-size="9" fill="#4A5568">You must be able to define each term AND use it correctly in your evidence — not just recognise it.</text>
</svg>
